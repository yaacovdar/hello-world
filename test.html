<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Voice AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-8">

    <div class="max-w-2xl w-full space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-indigo-400">Browser LLM + Voice</h1>
            <p class="text-slate-400 text-sm">Running locally via WebGPU</p>
        </header>

        <div id="status-card" class="bg-slate-800 p-4 rounded-xl border border-slate-700">
            <p id="status-text" class="text-sm">Initializing engine...</p>
            <div class="w-full bg-slate-700 h-2 mt-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl p-6 shadow-xl min-h-[300px] flex flex-col border border-slate-700">
            <div id="chat-box" class="flex-grow space-y-4 overflow-y-auto mb-4 text-lg">
                <p class="text-slate-500 italic text-center">Waiting for model to load...</p>
            </div>
            
            <div class="flex gap-4">
                <button id="mic-btn" disabled class="flex-1 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 py-3 rounded-lg font-bold transition-all flex items-center justify-center gap-2">
                    <span id="mic-icon">🎤</span> <span id="mic-text">Talk to AI</span>
                </button>
            </div>
        </div>
        
        <p id="transcript" class="text-indigo-300 text-center font-medium min-h-[1.5em]"></p>
    </div>

    <script type="module">
        // Import WebLLM from CDN
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const micBtn = document.getElementById('mic-btn');
        const chatBox = document.getElementById('chat-box');
        const transcriptDisplay = document.getElementById('transcript');

        // Configuration
        const selectedModel = "Llama-3.2-1B-Instruct-q4f16_1-MLC"; // Tiny but capable
        let engine;

        async function init() {
            try {
                engine = await webllm.CreateMLCEngine(selectedModel, {
                    initProgressCallback: (report) => {
                        statusText.innerText = report.text;
                        const progress = Math.round((report.progress || 0) * 100);
                        progressBar.style.width = `${progress}%`;
                    }
                });
                
                statusText.innerText = "Model Loaded! Ready to talk.";
                chatBox.innerHTML = '<p class="text-indigo-300 text-center">Click the button and say something!</p>';
                micBtn.disabled = false;
            } catch (err) {
                statusText.innerText = "Error: " + err.message;
                console.error(err);
            }
        }

        // Speech Recognition Setup
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            statusText.innerText = "Speech Recognition not supported in this browser.";
        } else {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            micBtn.onclick = () => {
                recognition.start();
                micBtn.classList.add('loading-pulse', 'bg-red-600');
                document.getElementById('mic-text').innerText = "Listening...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                transcriptDisplay.innerText = `"${transcript}"`;
                
                if (event.results[0].isFinal) {
                    processInput(transcript);
                }
            };

            recognition.onend = () => {
                micBtn.classList.remove('loading-pulse', 'bg-red-600');
                document.getElementById('mic-text').innerText = "Talk to AI";
            };
        }

        async function processInput(text) {
            chatBox.innerHTML = `<div class="text-slate-400 text-sm uppercase font-bold">You</div><p class="mb-4">${text}</p>`;
            chatBox.innerHTML += `<div class="text-indigo-400 text-sm uppercase font-bold">AI</div><p id="ai-response" class="loading-pulse">Thinking...</p>`;
            
            const responseElement = document.getElementById('ai-response');
            let fullReply = "";

            const messages = [{ role: "user", content: text }];
            
            const chunks = await engine.chat.completions.create({
                messages,
                stream: true,
            });

            responseElement.classList.remove('loading-pulse');
            responseElement.innerText = "";

            for await (const chunk of chunks) {
                const content = chunk.choices[0]?.delta?.content || "";
                fullReply += content;
                responseElement.innerText = fullReply;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        init();
    </script>
</body>
</html>
