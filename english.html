<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure - Kids Learning App</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4FACFE;
            --secondary: #00F2FE;
            --accent: #FFEB3B;
            --success: #4CAF50;
            --danger: #FF5252;
            --text-dark: #333;
            --bg-color: #F0F9FF;
            --skip-blue: #BAE6FD;
            --parental-bg: #E0E7FF;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- UI COMPONENTS --- */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .back-btn:active { transform: scale(0.9); }

        /* --- PROGRESS STARS --- */
        .stars-container {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
            justify-content: center;
            max-width: 90%;
            margin: 0 10px;
        }

        .star {
            font-size: 26px;
            color: #eee;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
        }

        .star.filled {
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.1); }
        }

        /* --- SCREENS --- */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- LEVEL SELECTION --- */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 95%;
            max-width: 900px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 6px solid #ccc;
        }

        .card:hover { transform: translateY(-5px); }
        .card:active { transform: translateY(2px); border-bottom-width: 2px; }

        .level-card { border-color: var(--primary); }
        .sublevel-card { border-color: var(--secondary); }

        /* --- PARENTAL DASHBOARD --- */
        #debug-screen {
            background: var(--parental-bg);
            padding: 20px;
            overflow-y: auto;
            justify-content: flex-start;
            height: 100%;
            width: 100%;
            display: none;
        }

        #debug-screen.active {
            display: flex;
        }

        .debug-level-section {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .debug-level-section h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .debug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .debug-word-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }

        .debug-word-card:hover {
            background: #f0f9ff;
            border-color: var(--primary);
            transform: scale(1.03);
        }

        .debug-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .debug-emoji {
            font-size: 50px;
            margin-bottom: 8px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- GAMEPLAY UI --- */
        .instruction {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary);
            padding: 0 15px;
        }

        .exercise-text-prompt {
            font-size: 3rem;
            color: var(--success);
            margin: 5px 0 25px 0;
            font-weight: 700;
            text-transform: capitalize;
            text-align: center;
        }

        .interaction-area {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .option-img-container {
            position: relative;
            width: 180px;
            height: 180px;
            border-radius: 24px;
            overflow: hidden;
            border: 6px solid white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .option-img-container:hover { 
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .option-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .emoji-box {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            background: #fff;
        }

        .img-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 8px 0;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            -webkit-text-stroke: 1.5px #333;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            background: linear-gradient(transparent, rgba(0,0,0,0.4));
            pointer-events: none;
        }

        /* --- MICROPHONE BUTTON --- */
        .mic-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-top: 20px;
        }

        .mic-btn.listening::after {
            content: '';
            position: absolute;
            width: 125%;
            height: 125%;
            border: 5px dashed var(--primary);
            border-radius: 50%;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- BUTTONS --- */
        .skip-btn {
            background: var(--skip-blue);
            color: #0369A1;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s, background 0.2s;
            width: auto;
            min-width: 120px;
            box-shadow: 0 4px 0 #93C5FD;
        }

        .skip-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .parental-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #cbd5e1;
            color: #475569;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.7;
        }

        .parental-btn:hover { opacity: 1; background: #94a3b8; }

        /* --- FEEDBACK OVERLAY --- */
        #feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .feedback-text {
            font-size: 5rem;
            font-weight: bold;
            color: var(--success);
            text-shadow: 3px 3px 0 white;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-25px); }
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 600px) {
            .option-img-container { width: 140px; height: 140px; }
            .emoji-box { font-size: 50px; }
            .instruction { font-size: 1.4rem; }
            .exercise-text-prompt { font-size: 2.2rem; }
            .stars-container { 
                flex-wrap: wrap;
                max-width: 320px; 
            }
        }
    </style>
</head>

        let voices = [];
        let recognition = null;
        let repeatTimer = null; 

        window.onload = () => {
            initSpeech();
            renderLevelMenu();
            initStars();
        };

        function initStars() {
            const container = document.getElementById('stars-bar');
            container.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const star = document.createElement('span');
                star.className = 'star';
                star.innerHTML = '★';
                star.id = `star-${i}`;
                container.appendChild(star);
            }
        }

        function initSpeech() {
            window.speechSynthesis.onvoiceschanged = () => {
                voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
            };
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';
            }
        }

        function speak(text, rate = 0.8) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (voices.length > 0) {
                utterance.voice = voices[Math.floor(Math.random() * voices.length)];
            }
            utterance.rate = rate;
            window.speechSynthesis.speak(utterance);
        }

        function startRepeatTimer(textToRepeat) {
            stopRepeatTimer();
            repeatTimer = setInterval(() => {
                speak(textToRepeat);
            }, 8000); 
        }

        function stopRepeatTimer() {
            if (repeatTimer) {
                clearInterval(repeatTimer);
                repeatTimer = null;
            }
        }

        function renderLevelMenu() {
            const menu = document.getElementById('level-menu');
            menu.innerHTML = '';
            const levelKeys = Object.keys(DATA).sort((a, b) => a - b);
            levelKeys.forEach(levelKey => {
                const card = document.createElement('div');
                card.className = 'card level-card';
                card.innerHTML = `<h3>Level ${levelKey}</h3><p>${DATA[levelKey].title}</p>`;
                card.onclick = () => selectLevel(levelKey);
                menu.appendChild(card);
            });
        }

        function selectLevel(lvl) {
            currentLevel = parseInt(lvl);
            showScreen('sublevel-screen');
            document.getElementById('level-title').innerText = `Level ${lvl}: ${DATA[lvl].title}`;
            const menu = document.getElementById('sublevel-menu');
            menu.innerHTML = '';
            for (let i = 1; i <= 3; i++) {
                const card = document.createElement('div');
                card.className = 'card sublevel-card';
                card.innerHTML = `<h3>Lesson ${lvl}.${i}</h3>`;
                card.onclick = () => startLesson(lvl, i);
                menu.appendChild(card);
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            const header = document.getElementById('app-header');
            header.style.display = (screenId === 'game-screen' || screenId === 'sublevel-screen' || screenId === 'debug-screen') ? 'flex' : 'none';
            if (screenId !== 'game-screen') stopRepeatTimer();
        }

        function showDebug() {
            showScreen('debug-screen');
            const root = document.getElementById('debug-content-root');
            root.innerHTML = '';

            Object.keys(DATA).sort((a, b) => a - b).forEach(levelKey => {
                const level = DATA[levelKey];
                const section = document.createElement('div');
                section.className = 'debug-level-section';
                section.innerHTML = `<h2>Level ${levelKey}: ${level.title}</h2>`;
                
                const grid = document.createElement('div');
                grid.className = 'debug-grid';
                
                level.words.forEach(item => {
                    const wordCard = document.createElement('div');
                    wordCard.className = 'debug-word-card';
                    wordCard.onclick = () => speak(item.word);
                    
                    if (item.url) {
                        wordCard.innerHTML = `<img class="debug-img" src="${item.url}" onerror="this.src='https://via.placeholder.com/90?text=Error'">`;
                    } else {
                        wordCard.innerHTML = `<div class="debug-emoji">${item.emoji}</div>`;
                    }
                    
                    const label = document.createElement('span');
                    label.style.fontWeight = 'bold';
                    label.style.marginTop = '5px';
                    label.innerText = item.word;
                    wordCard.appendChild(label);
                    
                    grid.appendChild(wordCard);
                });
                
                section.appendChild(grid);
                root.appendChild(section);
            });
        }

        function goBack() {
            const active = document.querySelector('.screen.active').id;
            if (active === 'sublevel-screen' || active === 'debug-screen') showScreen('welcome-screen');
            else if (active === 'game-screen') showScreen('sublevel-screen');
        }

        function goHome() {
            showScreen('welcome-screen');
        }

        function startLesson(lvl, sub) {
            currentSublevel = sub;
            currentQuestionIndex = 0;
            initStars();
            lessonQuestions = generateLessonQuestions(lvl);
            showScreen('game-screen');
            renderQuestion();
        }

        function generateLessonQuestions(lvl) {
            const currentLevelWords = DATA[lvl].words;
            let reviewPool = [];
            for (let i = 1; i < lvl; i++) reviewPool = [...reviewPool, ...DATA[i].words];

            const questions = [];
            for (let i = 0; i < 10; i++) {
                const target = currentLevelWords[i % currentLevelWords.length];
                questions.push(createRandomExercise(target, currentLevelWords));
            }
            if (reviewPool.length > 0) {
                for (let i = 0; i < 5; i++) {
                    const target = reviewPool[Math.floor(Math.random() * reviewPool.length)];
                    questions.push(createRandomExercise(target, reviewPool));
                }
            } else {
                for (let i = 0; i < 5; i++) {
                    const target = currentLevelWords[Math.floor(Math.random() * currentLevelWords.length)];
                    questions.push(createRandomExercise(target, currentLevelWords));
                }
            }
            return questions.sort(() => Math.random() - 0.5);
        }

        function createRandomExercise(target, pool) {
            const types = ['audioMatch', 'repeat', 'social', 'counting', 'sayWord'];
            let type = types[Math.floor(Math.random() * types.length)];
            if (target.social) type = 'social';
            return { type, target, options: generateOptions(target, pool) };
        }

        function generateOptions(target, pool) {
            const options = [target];
            const others = pool.filter(w => w.word !== target.word);
            while (options.length < 3 && others.length > 0) {
                options.push(others.splice(Math.floor(Math.random() * others.length), 1)[0]);
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function renderQuestion() {
            const q = lessonQuestions[currentQuestionIndex];
            const root = document.getElementById('interaction-root');
            const qText = document.getElementById('question-text');
            const info = document.getElementById('exercise-info');
            const status = document.getElementById('status-message');
            
            root.innerHTML = '';
            status.innerText = '';
            info.style.display = 'none';

            let isSpeechExercise = false;

            switch(q.type) {
                case 'audioMatch':
                    qText.innerText = "Tap the picture you hear!";
                    info.innerText = q.target.word; 
                    info.style.display = 'block';
                    speak(q.target.word);
                    startRepeatTimer(q.target.word); 
                    q.options.forEach(opt => {
                        root.appendChild(createImageOption(opt, () => checkAnswer(opt.word === q.target.word), false));
                    });
                    break;
                
                case 'repeat':
                    isSpeechExercise = true;
                    qText.innerText = `Can you say...`;
                    info.innerText = q.target.word;
                    info.style.display = 'block';
                    root.appendChild(createImageOption(q.target, () => speak(q.target.word), false));
                    root.appendChild(createMicButton(q.target.word));
                    speak(`Can you say ${q.target.word}?`);
                    startRepeatTimer(`Can you say ${q.target.word}?`);
                    break;

                case 'sayWord': 
                    isSpeechExercise = true;
                    qText.innerText = `Repeat after me:`;
                    info.innerText = q.target.word;
                    info.style.display = 'block';
                    root.appendChild(createImageOption(q.target, () => speak(q.target.word), false));
                    root.appendChild(createMicButton(q.target.word));
                    const sayMsg = `Repeat after me: ${q.target.word}`;
                    speak(sayMsg);
                    startRepeatTimer(sayMsg);
                    break;

                case 'social':
                    qText.innerText = `Listen and respond!`;
                    info.innerText = q.target.word; 
                    info.style.display = 'block';
                    speak(q.target.word);
                    startRepeatTimer(q.target.word); 
                    q.options.forEach(opt => {
                        const btn = createImageOption(opt, () => checkAnswer(opt.word === q.target.word), false);
                        root.appendChild(btn);
                    });
                    break;

                case 'counting':
                    isSpeechExercise = true;
                    let min = 2, max = 10;
                    if (currentLevel === 1) { min = 2; max = 3; }
                    else if (currentLevel === 2) { min = 3; max = 5; }
                    else { min = 5; max = 10; }
                    const num = Math.floor(Math.random() * (max - min + 1)) + min;

                    qText.innerText = `Count out loud!`;
                    const countArray = Array.from({length: num}, (_, i) => i + 1);
                    const countString = countArray.join(" ");
                    info.style.display = 'block';
                    info.innerText = countString;
                    root.appendChild(createMicButton(countString));
                    const countSpeech = `Please count from 1 to ${num}`;
                    speak(countSpeech);
                    startRepeatTimer(countSpeech);
                    break;
            }

            if (isSpeechExercise) {
                const skipBtn = document.createElement('button');
                skipBtn.className = 'skip-btn';
                skipBtn.innerText = "Skip ➡";
                skipBtn.onclick = () => skipQuestion();
                
                const skipContainer = document.createElement('div');
                skipContainer.style.width = '100%';
                skipContainer.style.display = 'flex';
                skipContainer.style.justifyContent = 'center';
                skipContainer.appendChild(skipBtn);
                root.appendChild(skipContainer);
            }
        }

        function createImageOption(data, callback, noLabel = false) {
            const div = document.createElement('div');
            div.className = 'option-img-container';
            
            if (data.url) {
                div.innerHTML = `<img src="${data.url}" onerror="this.src='https://via.placeholder.com/200?text=Image'">`;
            } else if (data.emoji) {
                div.innerHTML = `<div class="emoji-box">${data.emoji}</div>`;
            } else {
                div.innerHTML = `<div class="emoji-box" style="font-size: 20px;">${data.word}</div>`;
            }

            if (!noLabel) {
                const label = document.createElement('div');
                label.className = 'img-label';
                label.innerText = data.social ? data.response : data.word;
                div.appendChild(label);
            }

            if (callback) div.onclick = callback;
            return div;
        }

        function createMicButton(targetText) {
            const btn = document.createElement('button');
            btn.className = 'mic-btn';
            btn.innerHTML = '🎤';
            btn.onclick = () => handleSpeechInput(btn, targetText);
            return btn;
        }

        function handleSpeechInput(btn, target) {
            if (!recognition) return;
            stopRepeatTimer(); 
            btn.classList.add('listening');
            recognition.start();
            const timeout = setTimeout(() => {
                recognition.stop();
                btn.classList.remove('listening');
                document.getElementById('status-message').innerText = "Didn't hear anything. Try again!";
                startRepeatTimer(target); 
            }, 6000);

            recognition.onresult = (event) => {
                clearTimeout(timeout);
                btn.classList.remove('listening');
                const result = event.results[0][0].transcript.toLowerCase();
                if (isSimilar(result, target.toLowerCase())) {
                    checkAnswer(true);
                } else {
                    document.getElementById('status-message').innerText = `You said "${result}". Try again!`;
                    speak("Try saying it again!");
                    startRepeatTimer(target); 
                }
            };
            recognition.onerror = () => {
                clearTimeout(timeout);
                btn.classList.remove('listening');
                startRepeatTimer(target);
            };
        }

        function isSimilar(s1, s2) {
            const normalize = s => s.toLowerCase().replace(/[^a-z0-9]/g, '');
            const c1 = normalize(s1);
            const c2 = normalize(s2);
            if (c1 === c2) return true;
            if (c1.includes(c2) || c2.includes(c1)) return true;
            const w1 = s1.split(" ");
            const w2 = s2.split(" ");
            let matches = 0;
            w2.forEach(word => { if(w1.includes(word)) matches++; });
            return (matches / w2.length) >= 0.75;
        }

        function skipQuestion() {
            stopRepeatTimer();
            if (recognition) recognition.stop();
            
            // Generate a fresh random exercise for the current slot
            // This replaces the "counted without a star" bug by essentially "rerolling" the challenge
            const currentLevelWords = DATA[currentLevel].words;
            const newTarget = currentLevelWords[Math.floor(Math.random() * currentLevelWords.length)];
            lessonQuestions[currentQuestionIndex] = createRandomExercise(newTarget, currentLevelWords);
            
            renderQuestion();
        }

        function checkAnswer(isCorrect) {
            if (isCorrect) {
                stopRepeatTimer(); 
                const overlay = document.getElementById('feedback-overlay');
                const affirmation = AFFIRMATIONS[Math.floor(Math.random() * AFFIRMATIONS.length)];
                document.getElementById('feedback-message').innerText = affirmation;
                overlay.style.display = 'flex';
                speak(affirmation, 1.0);
                
                const star = document.getElementById(`star-${currentQuestionIndex}`);
                if (star) star.classList.add('filled');

                setTimeout(() => {
                    overlay.style.display = 'none';
                    nextQuestion(); 
                }, 1500);
            } else {
                speak("Oops, try again!");
                document.getElementById('status-message').innerText = "Not quite! Try once more.";
            }
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= 15) {
                showScreen('success-screen');
                speak("Great job! You finished the lesson!", 0.9);
            } else {
                renderQuestion();
            }
        }
    </script>
</body>
