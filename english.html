<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure - Kids Learning App</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4FACFE;
            --secondary: #00F2FE;
            --accent: #FFEB3B;
            --success: #4CAF50;
            --danger: #FF5252;
            --text-dark: #333;
            --bg-color: #F0F9FF;
            --skip-blue: #BAE6FD;
            --parental-bg: #E0E7FF;
            --card-shadow: rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* --- THEMES --- */
        body.theme-lvl-1 { --primary: #4FACFE; --bg-color: #F0F9FF; }
        body.theme-lvl-2 { --primary: #4ADE80; --bg-color: #F0FDF4; }
        body.theme-lvl-3 { --primary: #A855F7; --bg-color: #FAF5FF; }
        body.theme-lvl-4 { --primary: #FB923C; --bg-color: #FFF7ED; }
        body.theme-lvl-5 { --primary: #6366F1; --bg-color: #EEF2FF; }
        body.theme-lvl-6 { --primary: #F472B6; --bg-color: #FDF2F8; }
        body.theme-lvl-7 { --primary: #854D0E; --bg-color: #FEFCE8; }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Bubblegum Sans', cursive;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: background-color 0.5s ease;
        }

        /* --- UI COMPONENTS --- */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .back-btn, .stop-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stop-btn {
            background: #ffe4e6;
            color: #e11d48;
        }

        .back-btn:active, .stop-btn:active { transform: scale(0.9); }

        .stars-container {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
            justify-content: center;
            max-width: 60%;
            margin: 0 10px;
        }

        .star {
            font-size: 26px;
            color: #eee;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
        }

        .star.filled {
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.1); }
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 95%;
            max-width: 900px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 15px var(--card-shadow);
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 6px solid #ccc;
            font-family: inherit;
        }

        .card:hover { transform: translateY(-5px); }
        .card:active { transform: translateY(2px); border-bottom-width: 2px; }

        .level-card { border-color: var(--primary); }
        .sublevel-card { border-color: var(--secondary); }

        #debug-screen {
            background: var(--parental-bg);
            padding: 20px;
            overflow-y: auto;
            justify-content: flex-start;
            height: 100%;
            width: 100%;
            display: none;
        }

        #debug-screen.active { display: flex; }

        .debug-level-section {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .debug-level-section h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .debug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .debug-word-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            cursor: pointer;
            transition: var(--transition);
            background: #fff;
        }

        .debug-word-card:hover {
            background: var(--bg-color);
            border-color: var(--primary);
            transform: scale(1.03);
        }

        .debug-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .debug-emoji {
            font-size: 50px;
            margin-bottom: 8px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .instruction {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary);
            padding: 0 15px;
        }

        .exercise-text-prompt {
            font-size: 3.5rem;
            color: var(--success);
            margin: 5px 0 20px 0;
            font-weight: 700;
            text-transform: capitalize;
            text-align: center;
        }

        .interaction-area {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        /* --- CHALLENGE SPECIAL STYLES --- */
        .option-img-container {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 24px;
            overflow: visible;
            border: 6px solid white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: var(--transition);
            background: #fff;
        }

        .option-img-container .content-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .option-img-container:hover { 
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .option-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .emoji-box {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
        }

        .img-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 5px 0;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            -webkit-text-stroke: 1px #333;
            text-shadow: 1px 1px 0 #333, 0 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
            pointer-events: none;
            border-radius: 0 0 18px 18px;
            z-index: 5;
        }

        .highlight-frame { outline: 8px solid var(--accent); outline-offset: 4px; }
        .highlight-blink { animation: blinker 1.5s infinite; }
        @keyframes blinker { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .highlight-arrow::before {
            content: '👇';
            position: absolute;
            top: -55px; left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            animation: bounce-small 0.8s infinite alternate;
            z-index: 10;
        }
        @keyframes bounce-small { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(-10px); } }

        .mic-btn {
            width: 110px; height: 110px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-top: 20px;
        }

        .mic-btn.listening::after {
            content: '';
            position: absolute;
            width: 125%; height: 125%;
            border: 5px dashed var(--primary);
            border-radius: 50%;
            animation: spin 4s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .skip-btn {
            background: var(--skip-blue);
            color: #0369A1;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: var(--transition);
            width: auto;
            min-width: 120px;
            box-shadow: 0 4px 0 #93C5FD;
            font-family: inherit;
        }

        .skip-btn:active { transform: translateY(2px); box-shadow: none; }

        .parental-btn {
            position: absolute;
            bottom: 20px; right: 20px;
            background: #cbd5e1;
            color: #475569;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.7;
            font-family: inherit;
        }

        #feedback-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .feedback-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--success);
            text-shadow: 3px 3px 0 white;
            animation: bounce 0.6s infinite alternate;
            padding: 20px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .option-img-container { width: 120px; height: 120px; }
            .emoji-box { font-size: 40px; }
            .instruction { font-size: 1.5rem; }
            .exercise-text-prompt { font-size: 2.2rem; }
            .feedback-text { font-size: 2.2rem; }
            .stars-container { max-width: 50%; }
        }
    </style>
</head>
<body>

    <header id="app-header" style="display:none;">
        <button id="header-back-btn" class="back-btn">⬅ Back</button>
        <div class="stars-container" id="stars-bar"></div>
        <button id="header-stop-btn" class="stop-btn">Stop ⏹️</button>
    </header>

    <div id="game-container">
        <div id="welcome-screen" class="screen active">
            <h1 style="font-size: 4rem; color: var(--primary); margin-bottom: 20px; text-align: center;">English Adventure! 🌟</h1>
            <p style="font-size: 1.5rem; margin-bottom: 30px; color: #777;">Ready to learn and play?</p>
            <div class="grid-menu" id="level-menu"></div>
            <button id="open-parental-btn" class="parental-btn">⚙ Parental Dashboard</button>
        </div>

        <div id="sublevel-screen" class="screen">
            <h2 id="level-title" style="margin-bottom: 30px; color: var(--primary); font-size: 2.5rem;">Select a Lesson</h2>
            <div class="grid-menu" id="sublevel-menu"></div>
        </div>

        <div id="game-screen" class="screen">
            <div class="instruction" id="question-text">Look and listen!</div>
            <div id="exercise-info" class="exercise-text-prompt" style="display: none;"></div>
            <div class="interaction-area" id="interaction-root"></div>
            <div id="status-message" style="margin-top: 20px; font-weight: bold; color: #666; font-size: 1.3rem; min-height: 1.5em; text-align: center;"></div>
        </div>

        <div id="debug-screen" class="screen">
            <h1 style="color: #1e293b; margin-top: 20px; margin-bottom: 10px; font-size: 2.5rem;">Parental Overview</h1>
            <p style="margin-bottom: 30px; color: #64748b; font-size: 1.2rem;">Click any item to hear the voice.</p>
            <div id="debug-content-root" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        </div>

        <div id="success-screen" class="screen">
            <h1 style="font-size: 5rem; color: #FFD700;">AMAZING! 🏆</h1>
            <p style="font-size: 2.2rem;">You are an English Star!</p>
            <button id="success-home-btn" class="card" style="margin-top: 40px; padding: 25px 60px; font-size: 2.5rem; border-color: var(--primary);">Play More!</button>
        </div>
    </div>

    <div id="feedback-overlay">
        <div class="feedback-text" id="feedback-message">GREAT!</div>
    </div>

    <!-- Templates -->
    <template id="tpl-card">
        <div class="card">
            <h3></h3>
            <p></p>
        </div>
    </template>

    <template id="tpl-option">
        <div class="option-img-container">
            <div class="content-wrapper"></div>
            <div class="img-label"></div>
        </div>
    </template>

    <template id="tpl-debug-word">
        <div class="debug-word-card">
            <div class="debug-icon-wrapper"></div>
            <span class="debug-label"></span>
        </div>
    </template>

        };

        const WRONG_FEEDBACK_TEMPLATES = ["No, that was a {clicked}, can you find the {target}?", "Oops! That's a {clicked}. Where is the {target}?", "That's a {clicked}! Try looking for the {target}.", "Not quite! That was the {clicked}. Let's find the {target}.", "Whoops! You tapped the {clicked}. Can you see the {target}?"];
        const CORRECT_FEEDBACK_TEMPLATES = ["Good job, you found the {target}!", "Well done, that's the {target}!", "Great! That is the {target}!", "You got it! It's a {target}!", "Perfect! You found the {target}!"];
        const QUESTION_PROMPT_TEMPLATES = ["Can you find the {target}?", "Can you spot the {target}?", "Where is the {target}?", "Look for the {target}!", "I'm looking for the {target}. Do you see it?"];
        const DIGIT_MAP = { "1": "one", "2": "two", "3": "three", "4": "four", "5": "five", "6": "six", "7": "seven", "8": "eight", "9": "nine", "10": "ten" };
        const COLORS = ["Red", "Blue", "Green", "Yellow", "Orange", "Purple", "Pink", "White"];

        /** * ASSET SERVICE */
        const AssetService = {
            precache(questions) {
                const urls = questions.flatMap(q => {
                    const list = [q?.target?.url];
                    if (q?.options) q.options.forEach(o => list.push(o.url));
                    return list.filter(Boolean);
                });
                const unique = [...new Set(urls)];
                return Promise.all(unique.map(url => new Promise(resolve => {
                    const img = new Image();
                    img.onload = img.onerror = resolve;
                    img.src = url;
                })));
            }
        };

        /** * SPEECH SERVICE */
        const SpeechService = {
            voices: [], recognition: null,
            init() {
                window.speechSynthesis.onvoiceschanged = () => this.voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SR) { this.recognition = new SR(); this.recognition.lang = 'en-US'; }
            },
            stop() { window.speechSynthesis.cancel(); },
            speak(text, voice, rate = 0.8) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                if (voice) u.voice = voice;
                u.rate = rate; window.speechSynthesis.speak(u);
            },
            listen(target) {
                return new Promise((resolve, reject) => {
                    if (!this.recognition) return reject("No speech support");
                    let h = false;
                    const t = setTimeout(() => { if (!h) { h=true; this.recognition.stop(); reject("timeout"); } }, 6000);
                    this.recognition.onresult = (e) => { if (!h) { h=true; clearTimeout(t); resolve({ success: this.isSimilar(e.results[0][0].transcript, target), transcript: e.results[0][0].transcript }); } };
                    this.recognition.onerror = (e) => { if (!h) { h=true; clearTimeout(t); reject(e.error); } };
                    this.recognition.start();
                });
            },
            levenshtein(a, b) {
                const tmp = [];
                for (let i = 0; i <= a.length; i++) tmp[i] = [i];
                for (let j = 0; j <= b.length; j++) tmp[0][j] = j;
                for (let i = 1; i <= a.length; i++) {
                    for (let j = 1; j <= b.length; j++) {
                        tmp[i][j] = a[i-1] === b[j-1] ? tmp[i-1][j-1] : Math.min(tmp[i-1][j-1]+1, tmp[i][j-1]+1, tmp[i-1][j]+1);
                    }
                }
                return tmp[a.length][b.length];
            },
            isSimilar(s1, s2) {
                const norm = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
                const mapNums = s => { let o = s; Object.entries(DIGIT_MAP).forEach(([d, w]) => o = o.replace(new RegExp(`\\b${w}\\b`, 'g'), d)); return o; };
                const c1 = norm(s1); const c2 = norm(s2);
                if ((c2 === "small" || c2 === "little") && (c1.includes("little") || c1.includes("small"))) return true;
                if (c1 === c2 || mapNums(c1) === mapNums(c2)) return true;
                if (c1.includes(c2)) return true;
                const w1 = c1.split(" "); const w2 = c2.split(" ");
                let m = 0;
                w2.forEach(v => {
                    if (w1.some(v1 => {
                        if (v1 === v) return true;
                        if (v.length > 3) return this.levenshtein(v, v1) <= 1;
                        return false;
                    })) m++;
                });
                const fullDist = this.levenshtein(c1, c2);
                const threshold = Math.floor(c2.length * 0.35);
                return (m / w2.length) >= 0.7 || fullDist <= threshold;
            }
        };

        /** * UI FACTORY */
        const UIFactory = {
            createCard({ type, id, title, subtitle, classes = [] }) {
                const tpl = document.getElementById('tpl-card');
                const clone = tpl.content.cloneNode(true);
                const card = clone.querySelector('.card');
                card.dataset[type === 'level' ? 'lvl' : 'sub'] = id;
                card.classList.add(...classes);
                card.querySelector('h3').textContent = title;
                const p = card.querySelector('p');
                if (subtitle) p.textContent = subtitle; else p.remove();
                return clone;
            },
            createOption(data, config = {}) {
                const tpl = document.getElementById('tpl-option');
                const clone = tpl.content.cloneNode(true);
                const cont = clone.querySelector('.option-img-container');
                cont.dataset.word = config.labelOverride || data.word;
                if (config.isLocked) cont.dataset.locked = "true";
                if (config.highlight) cont.classList.add(`highlight-${config.highlight}`);
                if (config.bgColor) cont.style.backgroundColor = config.bgColor;
                const wrap = cont.querySelector('.content-wrapper');
                if (config.scale) wrap.style.transform = `scale(${config.scale})`;
                if (data.url) {
                    const img = document.createElement('img');
                    img.src = data.url;
                    img.onerror = () => img.src = 'https://via.placeholder.com/200?text=Image';
                    wrap.appendChild(img);
                } else {
                    const emo = document.createElement('div');
                    emo.className = 'emoji-box'; 
                    emo.textContent = data.emoji || data.word;
                    wrap.appendChild(emo);
                }
                const label = cont.querySelector('.img-label');
                if (config.showLabel === false) label.remove();
                else label.textContent = config.labelOverride || (data.social ? data.response : data.word);
                return clone;
            },
            createDebugItem(item) {
                const tpl = document.getElementById('tpl-debug-word');
                const clone = tpl.content.cloneNode(true);
                const card = clone.querySelector('.debug-word-card');
                card.dataset.word = item.word;
                const wrap = card.querySelector('.debug-icon-wrapper');
                if (item.url) {
                    const img = document.createElement('img');
                    img.className = 'debug-img'; img.src = item.url;
                    img.onerror = () => img.src = 'https://via.placeholder.com/90?text=Error';
                    wrap.appendChild(img);
                } else {
                    const emo = document.createElement('div');
                    emo.className = 'debug-emoji'; emo.textContent = item.emoji;
                    wrap.appendChild(emo);
                }
                card.querySelector('.debug-label').textContent = item.word;
                return clone;
            }
        };

        /** * STATE */
        const state = { 
            view: 'welcome', level: null, sublevel: null, 
            questionIndex: 0, questions: [], stars: Array(15).fill(false), 
            voice: null, repeatTimer: null, isProcessingSpeech: false,
            isAnswering: false // LOCKING MECHANISM FOR RACE CONDITIONS
        };

        function updateState(updates) { Object.assign(state, updates); render(); }

        /** * RENDERER */
        function render() {
            document.body.className = (state.level && DATA[state.level]) ? `theme-lvl-${state.level}` : '';
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const active = document.getElementById(`${state.view}-screen`);
            if (active) active.classList.add('active');
            
            const header = document.getElementById('app-header');
            header.style.display = (['game', 'sublevel', 'debug'].includes(state.view)) ? 'flex' : 'none';

            const starContainer = document.getElementById('stars-bar');
            starContainer.innerHTML = '';
            state.stars.forEach(f => {
                const s = document.createElement('span');
                s.className = `star ${f ? 'filled' : ''}`; s.innerHTML = '★';
                starContainer.appendChild(s);
            });

            if (state.view === 'welcome') renderWelcomeMenu();
            if (state.view === 'sublevel') renderSublevelMenu();
            if (state.view === 'game') renderQuestion();
            if (state.view === 'debug') renderDebugContent();
            if (state.view !== 'game') stopRepeatTimer();
        }

        function renderWelcomeMenu() {
            const menu = document.getElementById('level-menu'); menu.innerHTML = '';
            Object.keys(DATA).sort((a,b) => a-b).forEach(lvl => {
                menu.appendChild(UIFactory.createCard({ type: 'level', id: lvl, title: `Level ${lvl}`, subtitle: DATA[lvl].title, classes: ['level-card'] }));
            });
        }

        function renderSublevelMenu() {
            const lvl = state.level;
            if (!lvl || !DATA[lvl]) return;
            document.getElementById('level-title').textContent = `Level ${lvl}: ${DATA[lvl].title}`;
            const menu = document.getElementById('sublevel-menu'); menu.innerHTML = '';
            const count = lvl === 1 ? 4 : 3; 
            for (let i = 1; i <= count; i++) {
                menu.appendChild(UIFactory.createCard({ type: 'sublevel', id: i, title: `Lesson ${lvl}.${i}`, classes: ['sublevel-card'] }));
            }
        }

        function renderDebugContent() {
            const root = document.getElementById('debug-content-root'); root.innerHTML = '';
            Object.keys(DATA).sort((a,b)=>a-b).forEach(lvl => {
                const sec = document.createElement('div');
                sec.className = 'debug-level-section';
                sec.innerHTML = `<h2>Level ${lvl}: ${DATA[lvl].title}</h2>`;
                const grid = document.createElement('div'); grid.className = 'debug-grid';
                DATA[lvl].words.forEach(item => grid.appendChild(UIFactory.createDebugItem(item)));
                sec.appendChild(grid); root.appendChild(sec);
            });
        }

        /** * GAME LOGIC & EXERCISE GENERATION */
        async function startLesson(lvl, sub) {
            if (!lvl || !DATA[lvl]) return;
            document.getElementById('status-message').textContent = 'Loading adventure...';
            const pool = []; for (let i = 1; i <= lvl; i++) pool.push(...DATA[i].words);
            if (pool.length === 0) return;
            const q = []; 
            for (let i = 0; i < 15; i++) {
                if (lvl === 1 && sub === 3) {
                    const r = Math.random();
                    if (r > 0.6) q.push(createSizeExercise(pool));
                    else if (r > 0.3) q.push(createAdjectiveRepeatExercise(pool, "size"));
                    else q.push(createStandardExercise(pool));
                } else if (lvl === 1 && sub === 4) {
                    const r = Math.random();
                    if (r > 0.6) q.push(createAttributeChoiceExercise(pool));
                    else if (r > 0.3) q.push(createAdjectiveRepeatExercise(pool, "mixed"));
                    else q.push(createStandardExercise(pool));
                } else { q.push(createStandardExercise(pool)); }
            }
            await AssetService.precache(q);
            updateState({ view: 'game', level: lvl, sublevel: sub, questionIndex: 0, questions: q, stars: Array(15).fill(false), isAnswering: false });
        }

        function createStandardExercise(pool) {
            const target = pool[Math.floor(Math.random() * pool.length)];
            const types = ['audioMatch', 'repeat', 'social', 'counting', 'sayWord'];
            let type = types[Math.floor(Math.random() * types.length)];
            if (target.social) type = 'social';
            const options = [target]; const others = pool.filter(w => w.word !== target.word);
            while (options.length < 6 && others.length > 0) options.push(others.splice(Math.floor(Math.random()*others.length), 1)[0]);
            return { type, target, options: options.sort(() => Math.random() - 0.5) };
        }

        function createAdjectiveRepeatExercise(pool, mode) {
            const targetWord = pool[Math.floor(Math.random() * pool.length)];
            let attr;
            if (mode === "size") {
                attr = Math.random() > 0.5 ? "big" : "small";
            } else {
                const r = Math.random();
                if (r > 0.6) attr = Math.random() > 0.5 ? "big" : "small";
                else attr = targetWord.color || COLORS[Math.floor(Math.random()*COLORS.length)];
            }
            const label = `${attr} ${targetWord.word}`;
            return { 
                type: 'adjectiveRepeat', 
                target: targetWord, 
                phrase: label, 
                attr, 
                scale: attr === "big" ? 1.4 : (attr === "small" ? 0.7 : 1.0) 
            };
        }

        function createSizeExercise(pool) {
            const targetWord = pool[Math.floor(Math.random() * pool.length)];
            const size = Math.random() > 0.5 ? "big" : "small";
            const options = [];
            const otherPool = pool.filter(w => w.word !== targetWord.word);
            const others = otherPool.sort(() => Math.random() - 0.5).slice(0, 3);
            const distinctIcons = [targetWord, ...others];
            distinctIcons.forEach(item => {
                options.push({ ...item, scale: 1.4, size: "big" });
                options.push({ ...item, scale: 0.7, size: "small" });
            });
            const target = options.find(o => o.word === targetWord.word && (o.size === size));
            return { type: 'sizeMatch', target, size, word: targetWord.word, options: options.sort(() => Math.random() - 0.5) };
        }

        function createAttributeChoiceExercise(pool) {
            const targetWord = pool[Math.floor(Math.random() * pool.length)];
            const isSize = Math.random() > 0.5;
            const highlightType = ["frame", "blink", "arrow"][Math.floor(Math.random() * 3)];
            const options = [];
            let targetAttr, otherAttr;
            if (isSize) {
                targetAttr = Math.random() > 0.5 ? "big" : "small";
                otherAttr = targetAttr === "big" ? "small" : "big";
                options.push({ ...targetWord, size: "big", scale: 1.4, isTarget: targetAttr === "big" });
                options.push({ ...targetWord, size: "small", scale: 0.7, isTarget: targetAttr === "small" });
            } else {
                const cPool = COLORS.filter(c => c !== targetWord.color);
                targetAttr = targetWord.color || "Red";
                otherAttr = cPool[Math.floor(Math.random() * cPool.length)];
                options.push({ ...targetWord, colorName: targetAttr, bgColor: targetAttr, isTarget: true });
                options.push({ ...targetWord, colorName: otherAttr, bgColor: otherAttr, isTarget: false });
            }
            return { type: 'attributeChoice', target: targetWord, targetAttr, otherAttr, highlightType, options: options.sort(() => Math.random() - 0.5) };
        }

        function renderQuestion() {
            const q = state.questions[state.questionIndex];
            if (!q || !q.target) return;
            state.isAnswering = false; // Reset lock for new question

            const root = document.getElementById('interaction-root'); root.innerHTML = '';
            const info = document.getElementById('exercise-info'); info.style.display = 'none';
            const status = document.getElementById('status-message'); status.textContent = '';
            const qText = document.getElementById('question-text');
            if (SpeechService.voices.length > 0) state.voice = SpeechService.voices[Math.floor(Math.random()*SpeechService.voices.length)];
            let isSpeech = false;
            let prompt = "";

            if (q.type === 'sizeMatch') {
                prompt = [`Where is the ${q.size} ${q.word}?`, `Can you spot the ${q.size} ${q.word}?`][Math.floor(Math.random()*2)];
                qText.textContent = "Look and listen!";
                info.textContent = `${q.size} ${q.word}`; info.style.display = 'block';
                q.options.forEach(opt => {
                    const el = UIFactory.createOption(opt, { scale: opt.scale, labelOverride: opt.word });
                    el.querySelector('.option-img-container').dataset.size = opt.size;
                    root.appendChild(el);
                });
            } else if (q.type === 'attributeChoice') {
                isSpeech = true;
                prompt = `Is this the ${q.targetAttr} ${q.target.word} or the ${q.otherAttr} ${q.target.word}?`;
                qText.textContent = "Listen and Answer!";
                info.textContent = q.target.word; info.style.display = 'block';
                q.options.forEach(opt => {
                    root.appendChild(UIFactory.createOption(opt, { scale: opt.scale, bgColor: opt.bgColor, highlight: opt.isTarget ? q.highlightType : null, showLabel: false, isLocked: true }));
                });
                const mic = document.createElement('button'); mic.className = 'mic-btn'; mic.innerHTML = '🎤'; mic.dataset.target = q.targetAttr;
                root.appendChild(mic);
            } else if (q.type === 'adjectiveRepeat') {
                isSpeech = true;
                prompt = `Repeat after me: ${q.phrase}`;
                qText.textContent = "Say the phrase!";
                info.textContent = q.phrase; info.style.display = 'block';
                root.appendChild(UIFactory.createOption(q.target, { scale: q.scale, showLabel: false, isLocked: true }));
                const mic = document.createElement('button'); mic.className = 'mic-btn'; mic.innerHTML = '🎤'; mic.dataset.target = q.phrase;
                root.appendChild(mic);
            } else {
                const standardPrompt = QUESTION_PROMPT_TEMPLATES[Math.floor(Math.random()*QUESTION_PROMPT_TEMPLATES.length)].replace(/{target}/g, q.target.word);
                prompt = standardPrompt;
                qText.textContent = "Look and listen!";
                info.textContent = q.target.word; info.style.display = 'block';
                q.options.forEach(opt => root.appendChild(UIFactory.createOption(opt)));
                if (['repeat', 'sayWord', 'counting'].includes(q.type)) isSpeech = true;
                if (isSpeech) {
                   const micTarget = q.type === 'counting' ? info.textContent : q.target.word;
                   const mic = document.createElement('button'); mic.className = 'mic-btn'; mic.innerHTML = '🎤'; mic.dataset.target = micTarget;
                   root.appendChild(mic);
                }
            }

            SpeechService.speak(prompt, state.voice); 
            startRepeatTimer(prompt);
            if (isSpeech) {
                const wrap = document.createElement('div'); wrap.style.width = '100%'; wrap.style.display = 'flex'; wrap.style.justifyContent = 'center';
                const skip = document.createElement('button'); skip.id = 'skip-challenge-btn'; skip.className = 'skip-btn'; skip.textContent = "Skip ➡";
                wrap.appendChild(skip); root.appendChild(wrap);
            }
        }

        async function handleMic(btn, target) {
            if (state.isProcessingSpeech || state.isAnswering) return;
            stopRepeatTimer(); state.isProcessingSpeech = true; btn.classList.add('listening');
            document.getElementById('status-message').textContent = "Listening...";
            try {
                const r = await SpeechService.listen(target);
                if (r.success) checkAnswer(true); else {
                    document.getElementById('status-message').textContent = `You said "${r.transcript}". Try again!`;
                    SpeechService.speak("Try saying it again!", state.voice); startRepeatTimer(target);
                }
            } catch (e) {
                document.getElementById('status-message').textContent = e === 'timeout' ? "Didn't hear anything." : "Microphone error.";
                startRepeatTimer(target);
            } finally { btn.classList.remove('listening'); state.isProcessingSpeech = false; }
        }

        function checkAnswer(correct, clicked = "") {
            if (state.isAnswering) return; // RACE CONDITION FIX: EXIT IF ALREADY ANSWERED
            const q = state.questions[state.questionIndex];
            if (correct) {
                state.isAnswering = true; // LOCK FURTHER INPUTS
                stopRepeatTimer();
                const targetText = q.type === 'sizeMatch' ? `${q.size} ${q.word}` : (q.type === 'adjectiveRepeat' ? q.phrase : q.target.word);
                const feedback = CORRECT_FEEDBACK_TEMPLATES[Math.floor(Math.random()*CORRECT_FEEDBACK_TEMPLATES.length)].replace(/{target}/g, targetText);
                document.getElementById('feedback-message').textContent = feedback;
                document.getElementById('feedback-overlay').style.display = 'flex';
                SpeechService.speak(feedback, state.voice, 1.0);
                
                const newStars = [...state.stars]; 
                newStars[state.questionIndex] = true;
                
                setTimeout(() => { 
                    document.getElementById('feedback-overlay').style.display = 'none'; 
                    const idx = state.questionIndex + 1;
                    if (idx >= 15) updateState({ view: 'success', stars: newStars }); 
                    else updateState({ questionIndex: idx, stars: newStars, isAnswering: false });
                }, 2000);
            } else {
                const targetText = q.type === 'sizeMatch' ? `${q.size} ${q.word}` : q.target.word;
                const feedback = WRONG_FEEDBACK_TEMPLATES[Math.floor(Math.random()*WRONG_FEEDBACK_TEMPLATES.length)].replace(/{clicked}/g, clicked).replace(/{target}/g, targetText);
                SpeechService.speak(feedback, state.voice); document.getElementById('status-message').textContent = feedback;
            }
        }

        function startRepeatTimer(txt) { stopRepeatTimer(); state.repeatTimer = setInterval(() => SpeechService.speak(txt, state.voice), 10000); }
        function stopRepeatTimer() { if (state.repeatTimer) clearInterval(state.repeatTimer); }

        function setupEvents() {
            document.getElementById('game-container').addEventListener('click', e => {
                if (state.isAnswering) return; // GLOBAL UI LOCKING DURING FEEDBACK

                if (e.target.id === 'success-home-btn') return updateState({ view: 'welcome', level: null });
                if (e.target.id === 'skip-challenge-btn') {
                    if (!state.level || !DATA[state.level]) return;
                    const pool = []; for (let i = 1; i <= state.level; i++) pool.push(...DATA[i].words);
                    const sub = state.sublevel;
                    if (state.level === 1 && sub === 3) state.questions[state.questionIndex] = createSizeExercise(pool);
                    else if (state.level === 1 && sub === 4) state.questions[state.questionIndex] = createAttributeChoiceExercise(pool);
                    else state.questions[state.questionIndex] = createStandardExercise(pool);
                    return renderQuestion();
                }
                if (e.target.id === 'open-parental-btn') return updateState({ view: 'debug' });

                const lvlCard = e.target.closest('.level-card'); 
                if (lvlCard && lvlCard.dataset.lvl) return updateState({ view: 'sublevel', level: parseInt(lvlCard.dataset.lvl) });

                const subCard = e.target.closest('.sublevel-card'); 
                if (subCard && subCard.dataset.sub) return startLesson(state.level, parseInt(subCard.dataset.sub));
                
                const opt = e.target.closest('.option-img-container'); 
                if (opt) {
                    const q = state.questions[state.questionIndex];
                    if (opt.dataset.locked) {
                        SpeechService.speak(opt.dataset.word, state.voice);
                    } else if (q.type === 'sizeMatch') {
                        const isCorrectSize = opt.dataset.size === q.size || (q.size === "small" && opt.dataset.size === "little") || (q.size === "little" && opt.dataset.size === "small");
                        checkAnswer(opt.dataset.word === q.word && isCorrectSize, `${opt.dataset.size} ${opt.dataset.word}`);
                    } else {
                        checkAnswer(opt.dataset.word === q.target.word, opt.dataset.word);
                    }
                    return;
                }
                const mic = e.target.closest('.mic-btn'); if (mic) return handleMic(mic, mic.dataset.target);
            });

            document.getElementById('header-stop-btn').addEventListener('click', () => {
                stopRepeatTimer();
                SpeechService.stop();
            });

            document.getElementById('header-back-btn').addEventListener('click', () => {
                SpeechService.stop();
                stopRepeatTimer();
                if (state.view === 'sublevel' || state.view === 'debug') updateState({ view: 'welcome', level: null });
                else if (state.view === 'game') updateState({ view: 'sublevel' });
            });

            document.getElementById('debug-content-root').addEventListener('click', e => {
                const w = e.target.closest('.debug-word-card'); if (w) SpeechService.speak(w.dataset.word);
            });
        }

        window.onload = () => { SpeechService.init(); setupEvents(); render(); };
    </script>
</body>
