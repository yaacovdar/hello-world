<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure - Kids Learning App</title>
    <!-- Updated Font: Bubblegum Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4FACFE;
            --secondary: #00F2FE;
            --accent: #FFEB3B;
            --success: #4CAF50;
            --danger: #FF5252;
            --text-dark: #333;
            --bg-color: #F0F9FF;
            --skip-blue: #BAE6FD;
            --parental-bg: #E0E7FF;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Bubblegum Sans', cursive;
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- UI COMPONENTS --- */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        header {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .back-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
            font-family: inherit;
        }

        .back-btn:active { transform: scale(0.9); }

        /* --- PROGRESS STARS --- */
        .stars-container {
            display: flex;
            gap: 4px;
            flex-wrap: nowrap;
            justify-content: center;
            max-width: 90%;
            margin: 0 10px;
        }

        .star {
            font-size: 26px;
            color: #eee;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
        }

        .star.filled {
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.1); }
        }

        /* --- SCREENS --- */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- LEVEL SELECTION --- */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 95%;
            max-width: 900px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 6px solid #ccc;
            font-family: inherit;
        }

        .card:hover { transform: translateY(-5px); }
        .card:active { transform: translateY(2px); border-bottom-width: 2px; }

        .level-card { border-color: var(--primary); }
        .sublevel-card { border-color: var(--secondary); }

        /* --- PARENTAL DASHBOARD --- */
        #debug-screen {
            background: var(--parental-bg);
            padding: 20px;
            overflow-y: auto;
            justify-content: flex-start;
            height: 100%;
            width: 100%;
            display: none;
        }

        #debug-screen.active {
            display: flex;
        }

        .debug-level-section {
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
            background: white;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .debug-level-section h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .debug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .debug-word-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }

        .debug-word-card:hover {
            background: #f0f9ff;
            border-color: var(--primary);
            transform: scale(1.03);
        }

        .debug-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .debug-emoji {
            font-size: 50px;
            margin-bottom: 8px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- GAMEPLAY UI --- */
        .instruction {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: var(--primary);
            padding: 0 15px;
        }

        .exercise-text-prompt {
            font-size: 3.5rem;
            color: var(--success);
            margin: 5px 0 20px 0;
            font-weight: 700;
            text-transform: capitalize;
            text-align: center;
        }

        .interaction-area {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .option-img-container {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 24px;
            overflow: hidden;
            border: 6px solid white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .option-img-container:hover { 
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .option-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .emoji-box {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            background: #fff;
        }

        .img-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 5px 0;
            text-align: center;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            -webkit-text-stroke: 1px #333;
            text-shadow: 1px 1px 0 #333, 0 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(transparent, rgba(0,0,0,0.5));
            pointer-events: none;
        }

        /* --- MICROPHONE BUTTON --- */
        .mic-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            margin-top: 20px;
        }

        .mic-btn.listening::after {
            content: '';
            position: absolute;
            width: 125%;
            height: 125%;
            border: 5px dashed var(--primary);
            border-radius: 50%;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- BUTTONS --- */
        .skip-btn {
            background: var(--skip-blue);
            color: #0369A1;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s, background 0.2s;
            width: auto;
            min-width: 120px;
            box-shadow: 0 4px 0 #93C5FD;
            font-family: inherit;
        }

        .skip-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .parental-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #cbd5e1;
            color: #475569;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.7;
            font-family: inherit;
        }

        .parental-btn:hover { opacity: 1; background: #94a3b8; }

        /* --- FEEDBACK OVERLAY --- */
        #feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .feedback-text {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--success);
            text-shadow: 3px 3px 0 white;
            animation: bounce 0.6s infinite alternate;
            padding: 20px;
            text-align: center;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-25px); }
        }

        /* --- RESPONSIVE ADJUSTMENTS --- */
        @media (max-width: 600px) {
            .option-img-container { width: 120px; height: 120px; }
            .emoji-box { font-size: 40px; }
            .instruction { font-size: 1.5rem; }
            .exercise-text-prompt { font-size: 2.2rem; }
            .feedback-text { font-size: 2.2rem; }
            .stars-container { 
                flex-wrap: wrap;
                max-width: 320px; 
            }
        }
    </style>
</head>
<body>

    <header id="app-header" style="display:none;">
        <button class="back-btn" onclick="goBack()">⬅ Back</button>
        <div class="stars-container" id="stars-bar"></div>
        <div style="width: 80px;" class="header-spacer"></div> 
    </header>

    <div id="game-container">
        
        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen active">
            <h1 style="font-size: 4rem; color: var(--primary); margin-bottom: 20px; text-align: center;">English Adventure! 🌟</h1>
            <p style="font-size: 1.5rem; margin-bottom: 30px; color: #777;">Ready to learn and play?</p>
            <div class="grid-menu" id="level-menu"></div>
            <button class="parental-btn" onclick="updateState({view: 'debug'})">⚙ Parental Dashboard</button>
        </div>

        <!-- Sublevel Selection -->
        <div id="sublevel-screen" class="screen">
            <h2 id="level-title" style="margin-bottom: 30px; color: var(--primary); font-size: 2.5rem;">Select a Lesson</h2>
            <div class="grid-menu" id="sublevel-menu"></div>
        </div>

        <!-- Gameplay Screen -->
        <div id="game-screen" class="screen">

            <div class="interaction-area" id="interaction-root"></div>
            <div id="status-message" style="margin-top: 20px; font-weight: bold; color: #666; font-size: 1.3rem; min-height: 1.5em; text-align: center;"></div>
        </div>

        <!-- Parental / Debug Screen -->
        <div id="debug-screen" class="screen">
            <h1 style="color: #1e293b; margin-top: 20px; margin-bottom: 10px; font-size: 2.5rem;">Parental Overview</h1>
            <p style="margin-bottom: 30px; color: #64748b; font-size: 1.2rem;">Click any item to hear the voice.</p>
            <div id="debug-content-root" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Success Screen -->
        <div id="success-screen" class="screen">
            <h1 style="font-size: 5rem; color: #FFD700;">AMAZING! 🏆</h1>
            <p style="font-size: 2.2rem;">You are an English Star!</p>
            <button class="card level-card" style="margin-top: 40px; padding: 25px 60px; font-size: 2.5rem;" onclick="updateState({view: 'welcome'})">Play More!</button>
        </div>

    </div>

    <!-- Feedback Overlay -->
    <div id="feedback-overlay">
        <div class="feedback-text" id="feedback-message">GREAT!</div>
    </div>

        const WRONG_FEEDBACK_TEMPLATES = [
            "No, that was a {clicked}, can you find the {target}?",
            "Oops! That's a {clicked}. Where is the {target}?",
            "That's a {clicked}! Try looking for the {target}.",
            "Not quite! That was the {clicked}. Let's find the {target}.",
            "Whoops! You tapped the {clicked}. Can you see the {target}?"

        const CORRECT_FEEDBACK_TEMPLATES = [
            "Good job, you found the {target}!",
            "Well done, that's the {target}!",
            "Great! That is the {target}!",
            "You got it! It's a {target}!",
            "Perfect! You found the {target}!"
        ];

        const QUESTION_PROMPT_TEMPLATES = [
            "Can you find the {target}?",
            "Can you spot the {target}?",
            "Where is the {target}?",
            "Look for the {target}!",
            "I'm looking for the {target}. Do you see it?"
        ];

        const DIGIT_MAP = { "1": "one", "2": "two", "3": "three", "4": "four", "5": "five", "6": "six", "7": "seven", "8": "eight", "9": "nine", "10": "ten" };

        /** * STATE MANAGEMENT */
        const state = {
            view: 'welcome', // welcome, sublevel, game, debug, success
            level: null,
            sublevel: null,
            questionIndex: 0,
            questions: [],
            stars: Array(15).fill(false),
            voice: null,
            voices: [],
            recognition: null,
            repeatTimer: null
        };

        function updateState(updates) {
            Object.assign(state, updates);
            render();
        }

        /** * RENDERER */
        function render() {
            // Hide all screens
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            
            // Show active screen
            const activeScreen = document.getElementById(`${state.view}-screen`);
            if (activeScreen) activeScreen.classList.add('active');

            // Header logic
            const header = document.getElementById('app-header');
            header.style.display = (['game', 'sublevel', 'debug'].includes(state.view)) ? 'flex' : 'none';

            // Refresh progress stars
            renderStars();

            // Screen-specific updates
            if (state.view === 'welcome') renderWelcomeMenu();
            if (state.view === 'sublevel') renderSublevelMenu();
            if (state.view === 'game') renderQuestion();
            if (state.view === 'debug') renderDebugContent();

            // Clear timer if not in game
            if (state.view !== 'game') stopRepeatTimer();
        }

        function renderStars() {
            const container = document.getElementById('stars-bar');
            container.innerHTML = '';
            state.stars.forEach((filled, i) => {
                const star = document.createElement('span');
                star.className = `star ${filled ? 'filled' : ''}`;
                star.innerHTML = '★';
                container.appendChild(star);
            });
        }

        function renderWelcomeMenu() {
            const menu = document.getElementById('level-menu');
            menu.innerHTML = '';
            Object.keys(DATA).sort((a, b) => a - b).forEach(lvl => {
                const card = document.createElement('div');
                card.className = 'card level-card';
                card.innerHTML = `<h3>Level ${lvl}</h3><p>${DATA[lvl].title}</p>`;
                card.onclick = () => updateState({ view: 'sublevel', level: parseInt(lvl) });
                menu.appendChild(card);
            });
        }

        function renderSublevelMenu() {
            const lvl = state.level;
            document.getElementById('level-title').innerText = `Level ${lvl}: ${DATA[lvl].title}`;
            const menu = document.getElementById('sublevel-menu');
            menu.innerHTML = '';
            for (let i = 1; i <= 3; i++) {
                const card = document.createElement('div');
                card.className = 'card sublevel-card';
                card.innerHTML = `<h3>Lesson ${lvl}.${i}</h3>`;
                card.onclick = () => startLesson(lvl, i);
                menu.appendChild(card);
            }
        }

        function renderDebugContent() {
            const root = document.getElementById('debug-content-root');
            root.innerHTML = '';
            Object.keys(DATA).sort((a, b) => a - b).forEach(lvl => {
                const level = DATA[lvl];
                const section = document.createElement('div');
                section.className = 'debug-level-section';
                section.innerHTML = `<h2>Level ${lvl}: ${level.title}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'debug-grid';
                level.words.forEach(item => {
                    const wordCard = document.createElement('div');
                    wordCard.className = 'debug-word-card';
                    wordCard.onclick = () => { state.voice = null; speak(item.word); };
                    wordCard.innerHTML = item.url ? `<img class="debug-img" src="${item.url}" onerror="this.src='https://via.placeholder.com/90?text=Error'">` : `<div class="debug-emoji">${item.emoji}</div>`;
                    const label = document.createElement('span');
                    label.style.fontWeight = 'bold';
                    label.style.marginTop = '5px';
                    label.innerText = item.word;
                    wordCard.appendChild(label);
                    grid.appendChild(wordCard);
                });
                section.appendChild(grid);
                root.appendChild(section);
            });
        }

        /** * GAME LOGIC */
        function startLesson(lvl, sub) {
            const questions = generateLessonQuestions(lvl);
            updateState({
                view: 'game',
                level: lvl,
                sublevel: sub,
                questionIndex: 0,
                questions: questions,
                stars: Array(15).fill(false)
            });
        }

        function generateLessonQuestions(lvl) {
            const currentLevelWords = DATA[lvl].words;
            let pool = [];
            for (let i = 1; i <= lvl; i++) pool = [...pool, ...DATA[i].words];
            
            const q = [];
            for (let i = 0; i < 15; i++) {
                const target = pool[Math.floor(Math.random() * pool.length)];
                q.push(createExercise(target, pool, lvl));
            }
            return q;
        }

        function createExercise(target, pool, lvl) {
            const types = ['audioMatch', 'repeat', 'social', 'counting', 'sayWord'];
            let type = types[Math.floor(Math.random() * types.length)];
            if (target.social) type = 'social';
            return { type, target, options: generateOptions(target, pool) };
        }

        function generateOptions(target, pool) {
            const options = [target];
            const others = pool.filter(w => w.word !== target.word);
            while (options.length < 6 && others.length > 0) {
                options.push(others.splice(Math.floor(Math.random() * others.length), 1)[0]);
            }
            return options.sort(() => Math.random() - 0.5);
        }

        function renderQuestion() {
            const q = state.questions[state.questionIndex];
            const root = document.getElementById('interaction-root');
            const qText = document.getElementById('question-text');
            const info = document.getElementById('exercise-info');
            const status = document.getElementById('status-message');
            
            root.innerHTML = '';
            status.innerText = '';
            info.style.display = 'none';

            // Voice consistency
            if (state.voices.length > 0) state.voice = state.voices[Math.floor(Math.random() * state.voices.length)];

            let isSpeech = false;

            if (['audioMatch', 'social'].includes(q.type)) {
                const prompt = QUESTION_PROMPT_TEMPLATES[Math.floor(Math.random() * QUESTION_PROMPT_TEMPLATES.length)];
                const spoken = prompt.replace(/{target}/g, q.target.word);
                qText.innerText = "Look and listen!";
                info.innerText = q.target.word; info.style.display = 'block';
                speak(spoken); startRepeatTimer(spoken);
                q.options.forEach(opt => root.appendChild(createOptionUI(opt, () => checkAnswer(opt.word === q.target.word, opt.word))));
            } else if (['repeat', 'sayWord'].includes(q.type)) {
                isSpeech = true;
                qText.innerText = q.type === 'repeat' ? 'Can you say...' : 'Repeat after me:';
                info.innerText = q.target.word; info.style.display = 'block';
                root.appendChild(createOptionUI(q.target, () => speak(q.target.word)));
                root.appendChild(createMicBtn(q.target.word));
                const spoken = q.type === 'repeat' ? `Can you say ${q.target.word}?` : `Repeat after me: ${q.target.word}`;
                speak(spoken); startRepeatTimer(spoken);
            } else if (q.type === 'counting') {
                isSpeech = true;
                const num = state.level === 1 ? 3 : (state.level === 2 ? 5 : 10);
                qText.innerText = `Count out loud!`;
                const countStr = Array.from({length: num}, (_, i) => i + 1).join(" ");
                info.innerText = countStr; info.style.display = 'block';
                root.appendChild(createMicBtn(countStr));
                const spoken = `Please count from 1 to ${num}`;
                speak(spoken); startRepeatTimer(spoken);
            }

            if (isSpeech) {
                const container = document.createElement('div');
                container.style.width = '100%'; container.style.display = 'flex'; container.style.justifyContent = 'center';
                const skip = document.createElement('button');
                skip.className = 'skip-btn'; skip.innerText = "Skip ➡";
                skip.onclick = skipQuestion;
                container.appendChild(skip);
                root.appendChild(container);
            }
        }

        function createOptionUI(data, callback) {
            const div = document.createElement('div');
            div.className = 'option-img-container';
            div.innerHTML = data.url ? `<img src="${data.url}" onerror="this.src='https://via.placeholder.com/200?text=Image'">` : `<div class="emoji-box">${data.emoji || data.word}</div>`;
            const label = document.createElement('div');
            label.className = 'img-label'; label.innerText = data.social ? data.response : data.word;
            div.appendChild(label);
            div.onclick = callback;
            return div;
        }

        function createMicBtn(target) {
            const btn = document.createElement('button');
            btn.className = 'mic-btn'; btn.innerHTML = '🎤';
            btn.onclick = () => handleSpeech(btn, target);
            return btn;
        }

        /** * HELPERS */
        function initSpeech() {
            window.speechSynthesis.onvoiceschanged = () => { state.voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('en')); };
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SR) { state.recognition = new SR(); state.recognition.lang = 'en-US'; }
        }

        function speak(text, rate = 0.8) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            if (state.voice) u.voice = state.voice;
            u.rate = rate; window.speechSynthesis.speak(u);
        }

        function startRepeatTimer(txt) { stopRepeatTimer(); state.repeatTimer = setInterval(() => speak(txt), 10000); }
        function stopRepeatTimer() { if (state.repeatTimer) clearInterval(state.repeatTimer); }

        function handleSpeech(btn, target) {
            if (!state.recognition) return;
            stopRepeatTimer(); btn.classList.add('listening'); state.recognition.start();
            const timer = setTimeout(() => { state.recognition.stop(); btn.classList.remove('listening'); startRepeatTimer(target); }, 6000);
            state.recognition.onresult = (e) => {
                clearTimeout(timer); btn.classList.remove('listening');
                if (isSimilar(e.results[0][0].transcript, target)) checkAnswer(true);
                else { speak("Try saying it again!"); startRepeatTimer(target); }
            };
            state.recognition.onerror = () => { clearTimeout(timer); btn.classList.remove('listening'); startRepeatTimer(target); };
        }

        function isSimilar(s1, s2) {
            const norm = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
            const mapNums = s => { let out = s; Object.entries(DIGIT_MAP).forEach(([d, w]) => out = out.replace(new RegExp(`\\b${w}\\b`, 'g'), d)); return out; };
            const c1 = norm(s1); const c2 = norm(s2);
            if (c1 === c2 || mapNums(c1) === mapNums(c2)) return true;
            const words2 = c2.split(" ");
            let m = 0; words2.forEach(w2 => { if (c1.split(" ").some(w1 => w1 === w2 || (w1.length > 2 && w2.includes(w1)))) m++; });
            return (m / words2.length) >= 0.7;
        }

        function checkAnswer(correct, clicked = "") {
            if (correct) {
                stopRepeatTimer();
                const template = CORRECT_FEEDBACK_TEMPLATES[Math.floor(Math.random() * CORRECT_FEEDBACK_TEMPLATES.length)];
                const feedback = template.replace(/{target}/g, state.questions[state.questionIndex].target.word);
                document.getElementById('feedback-message').innerText = feedback;
                document.getElementById('feedback-overlay').style.display = 'flex';
                speak(feedback, 1.0);
                const newStars = [...state.stars]; newStars[state.questionIndex] = true;
                setTimeout(() => { document.getElementById('feedback-overlay').style.display = 'none'; nextQuestion(newStars); }, 2000);
            } else {
                const template = WRONG_FEEDBACK_TEMPLATES[Math.floor(Math.random() * WRONG_FEEDBACK_TEMPLATES.length)];
                const feedback = template.replace(/{clicked}/g, clicked).replace(/{target}/g, state.questions[state.questionIndex].target.word);
                speak(feedback); document.getElementById('status-message').innerText = feedback;
            }
        }

        function skipQuestion() {
            const lvl = state.level;
            const newQuestions = [...state.questions];
            const pool = DATA[lvl].words;
            const newTarget = pool[Math.floor(Math.random() * pool.length)];
            newQuestions[state.questionIndex] = createExercise(newTarget, pool, lvl);
            updateState({ questions: newQuestions });
        }

        function nextQuestion(newStars) {
            const idx = state.questionIndex + 1;
            if (idx >= 15) updateState({ view: 'success', stars: newStars });
            else updateState({ questionIndex: idx, stars: newStars });
        }

        function goBack() {
            if (state.view === 'sublevel' || state.view === 'debug') updateState({ view: 'welcome' });
            else if (state.view === 'game') updateState({ view: 'sublevel' });
        }

        initSpeech();
        render();
    </script>
</body>
