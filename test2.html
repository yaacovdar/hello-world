<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Tiny AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-zinc-900 border border-zinc-800 rounded-3xl p-8 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-cyan-400">Qwen Tiny</h1>
            <p id="status" class="text-zinc-500 text-xs mt-2 uppercase tracking-widest">Initializing...</p>
        </div>

        <div id="display" class="h-48 overflow-y-auto mb-6 text-lg border-l-2 border-cyan-500/30 pl-4 flex flex-col justify-end">
            <p id="ai-text" class="text-zinc-100">Ready for your voice...</p>
        </div>

        <div class="space-y-4">
            <p id="user-transcript" class="text-center text-cyan-300 italic min-h-[1.5rem] text-sm"></p>
            
            <button id="mic-btn" disabled class="w-full bg-cyan-600 hover:bg-cyan-500 disabled:bg-zinc-800 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-3">
                <span id="btn-label">Loading Model...</span>
            </button>
        </div>
    </div>

    <div id="log" class="mt-4 text-[10px] text-zinc-600 font-mono max-w-md w-full text-center"></div>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

        const status = document.getElementById('status');
        const aiText = document.getElementById('ai-text');
        const transcript = document.getElementById('user-transcript');
        const micBtn = document.getElementById('mic-btn');
        const btnLabel = document.getElementById('btn-label');
        const log = document.getElementById('log');

        let generator;

        async function init() {
            try {
                // Qwen2.5-0.5B is ~350MB in 4-bit, but much more stable than SmolLM right now
                generator = await pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
                    device: 'webgpu', 
                    dtype: 'q4',
                    progress_callback: (p) => {
                        if(p.status === 'progress') {
                            log.innerText = `Loading: ${p.file} (${Math.round(p.loaded / 1024 / 1024)}MB)`;
                        }
                    }
                });

                status.innerText = "Local Model Ready";
                micBtn.disabled = false;
                btnLabel.innerText = "Hold to Speak";
            } catch (e) {
                console.error(e);
                status.innerText = "Error: " + e.message;
            }
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        micBtn.onmousedown = () => {
            recognition.start();
            btnLabel.innerText = "Listening...";
            micBtn.classList.replace('bg-cyan-600', 'bg-red-600');
        };

        micBtn.onmouseup = () => {
            recognition.stop();
            btnLabel.innerText = "Thinking...";
            micBtn.classList.replace('bg-red-600', 'bg-cyan-600');
        };

        recognition.onresult = async (event) => {
            const query = event.results[0][0].transcript;
            transcript.innerText = `"${query}"`;
            generateResponse(query);
        };

        async function generateResponse(text) {
            aiText.innerText = "Generating...";
            
            const messages = [
                { role: "system", content: "You are a helpful, very brief assistant." },
                { role: "user", content: text }
            ];

            try {
                const output = await generator(messages, { 
                    max_new_tokens: 64,
                    temperature: 0.7,
                    // Removing redundant parameters to avoid the Tensor error
                });

                aiText.innerText = output[0].generated_text.at(-1).content;
                btnLabel.innerText = "Hold to Speak";
            } catch (err) {
                aiText.innerText = "Generation Error. Check console.";
                console.error(err);
            }
        }

        init();
    </script>
</body>
</html>
