<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Tiny - Fixed Scroll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        #display::-webkit-scrollbar {
            width: 4px;
        }
        #display::-webkit-scrollbar-track {
            background: transparent;
        }
        #display::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }
        #display::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-zinc-900 border border-zinc-800 rounded-3xl p-6 md:p-8 shadow-2xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-cyan-400">Qwen Tiny</h1>
            <p id="status" class="text-zinc-500 text-[10px] mt-2 uppercase tracking-[0.2em]">Initializing Local Model...</p>
        </div>

        <!-- Scrollable Display Container -->
        <div id="display" class="h-64 overflow-y-auto mb-6 border-l-2 border-cyan-500/20 pl-4 pr-2 transition-all">
            <div id="ai-text-container" class="space-y-4 py-2">
                <p id="ai-text" class="text-zinc-100 leading-relaxed whitespace-pre-wrap text-lg">
                    Ready for your voice...
                </p>
            </div>
        </div>

        <div class="space-y-4">
            <div class="min-h-[2.5rem] flex items-center justify-center">
                <p id="user-transcript" class="text-center text-cyan-300 italic text-sm opacity-80"></p>
            </div>
            
            <button id="mic-btn" disabled class="w-full bg-cyan-600 hover:bg-cyan-500 active:scale-[0.98] disabled:bg-zinc-800 disabled:text-zinc-600 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-3 touch-none select-none">
                <span id="btn-label">Loading Model...</span>
            </button>
            <p class="text-[10px] text-center text-zinc-600 uppercase tracking-widest">Hold to speak, release to send</p>
        </div>
    </div>

    <div id="log" class="mt-6 text-[10px] text-zinc-700 font-mono max-w-md w-full text-center break-all"></div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

        /**
         * SILENCE ONNX RUNTIME WARNINGS
         */
        const hideWarnings = (logger) => {
            const original = console[logger];
            console[logger] = (...args) => {
                const msg = args.join(' ');
                if (msg.includes('VerifyEachNodeIsAssignedToAnEp') || 
                    msg.includes('Some nodes were not assigned') ||
                    msg.includes('Rerunning with verbose output')) {
                    return;
                }
                original.apply(console, args);
            };
        };
        hideWarnings('warn');
        hideWarnings('error');

        const status = document.getElementById('status');
        const display = document.getElementById('display');
        const aiText = document.getElementById('ai-text');
        const transcript = document.getElementById('user-transcript');
        const micBtn = document.getElementById('mic-btn');
        const btnLabel = document.getElementById('btn-label');
        const log = document.getElementById('log');

        let generator;

        // Text to Speech Helper
        const speak = (text) => {
            // Cancel any current speech before starting new one
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        };

        function scrollToBottom() {
            display.scrollTo({
                top: display.scrollHeight,
                behavior: 'smooth'
            });
        }

        async function init() {
            try {
                env.allowLocalModels = false;
                if (env.backends && env.backends.onnx) {
                    env.backends.onnx.logLevel = 'error';
                }
                
                generator = await pipeline('text-generation', 'onnx-community/Qwen2.5-0.5B-Instruct', {
                    device: 'webgpu', 
                    dtype: 'q4',
                    progress_callback: (p) => {
                        if(p.status === 'progress') {
                            log.innerText = `Downloading: ${p.file} (${Math.round(p.loaded / 1024 / 1024)}MB / ${Math.round(p.total / 1024 / 1024)}MB)`;
                        } else if (p.status === 'ready') {
                            log.innerText = "Model assets ready.";
                        }
                    }
                });

                status.innerText = "Local Intelligence Ready";
                micBtn.disabled = false;
                btnLabel.innerText = "Hold to Speak";
                log.innerText = "Model loaded successfully via WebGPU. Audio enabled.";
            } catch (e) {
                console.error(e);
                status.innerText = "Initialization Failed";
                log.innerText = "Error: " + e.message + ". WebGPU might be unsupported.";
            }
        }

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        const startListening = () => {
            if (micBtn.disabled) return;
            try {
                // Stop AI from talking when user starts speaking
                window.speechSynthesis.cancel();
                recognition.start();
                btnLabel.innerText = "Listening...";
                micBtn.classList.replace('bg-cyan-600', 'bg-red-600');
                transcript.innerText = "Go ahead, I'm listening...";
            } catch (e) {
                // Ignore state errors
            }
        };

        const stopListening = () => {
            if (micBtn.disabled) return;
            recognition.stop();
            btnLabel.innerText = "Processing...";
            micBtn.classList.replace('bg-red-600', 'bg-cyan-600');
        };

        micBtn.onmousedown = startListening;
        micBtn.onmouseup = stopListening;
        micBtn.onmouseleave = stopListening;
        micBtn.ontouchstart = (e) => { e.preventDefault(); startListening(); };
        micBtn.ontouchend = (e) => { e.preventDefault(); stopListening(); };

        recognition.onresult = async (event) => {
            const query = event.results[0][0].transcript;
            transcript.innerText = `"${query}"`;
            generateResponse(query);
        };

        async function generateResponse(text) {
            aiText.innerText = "Thinking...";
            btnLabel.innerText = "Generating...";
            
            const messages = [
                { role: "system", content: "You are a helpful, very brief assistant. Provide concise answers." },
                { role: "user", content: text }
            ];

            try {
                const output = await generator(messages, { 
                    max_new_tokens: 128,
                    temperature: 0.6,
                });

                const response = output[0].generated_text.at(-1).content;
                aiText.innerText = response;
                btnLabel.innerText = "Hold to Speak";
                
                // Speak the response
                speak(response);
                
                setTimeout(scrollToBottom, 50);
            } catch (err) {
                aiText.innerText = "I encountered an error during generation.";
                btnLabel.innerText = "Error - Try Again";
            }
        }

        init();
    </script>
</body>
</html>
