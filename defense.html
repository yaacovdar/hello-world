<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Shield: Neon Defense</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ea;
            --neon-purple: #9d00ff;
            --neon-orange: #ff9d00;
            --bg-dark: #050510;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .stat-item {
            background: rgba(0, 242, 255, 0.1);
            padding: 10px 20px;
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
        }

        .shield-container {
            width: 250px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid white;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        #shield-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff0055, #00f2ff);
            transition: width 0.3s ease;
        }

        .powerup-btn {
            pointer-events: auto;
            align-self: flex-end;
            background: var(--neon-purple);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-purple);
            text-transform: uppercase;
            transition: transform 0.1s, opacity 0.3s;
        }

        .powerup-btn:active {
            transform: scale(0.9);
        }

        .powerup-btn:disabled {
            opacity: 0.3;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            background: linear-gradient(to bottom, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--neon-blue));
            text-transform: uppercase;
        }

        .btn-start {
            margin-top: 30px;
            padding: 15px 50px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.3s;
        }

        .btn-start:hover {
            background: var(--neon-blue);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .hidden {
            display: none !important;
        }

        .tutorial {
            margin-top: 20px;
            color: #aaa;
            font-size: 0.9rem;
            max-width: 400px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-layer">
        <div class="stats-bar">
            <div>
                <div class="stat-item">Score: <span id="score-val">0</span></div>
                <div class="shield-container"><div id="shield-fill"></div></div>
            </div>
            <div class="stat-item">Wave: <span id="wave-val">1</span></div>
        </div>

        <button id="jam-btn" class="powerup-btn">GPS Jammer (Space)</button>
    </div>

    <!-- Start Overlay -->
    <div id="start-overlay" class="overlay">
        <h1>Sky Shield</h1>
        <p style="color: var(--neon-blue); font-weight: bold;">NEON DEFENSE</p>
        <div class="tutorial">
            TAP HIGH: Launch Arrow Interceptor (Ballistics)<br>
            TAP MID: Create Defense Bubble (Patriot/THAAD)<br>
            AUTO-DOME: Targets low-altitude rockets automatically.<br>
            <b>CAUTION:</b> Intercepted debris damages the city. Intercept high!
        </div>
        <button class="btn-start" onclick="startGame()">Initiate</button>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameover-overlay" class="overlay hidden">
        <h1 style="filter: drop-shadow(0 0 15px var(--neon-pink));">Shield Failed</h1>
        <p id="final-score" style="font-size: 1.5rem; margin: 20px 0;">Final Score: 0</p>
        <button class="btn-start" onclick="location.reload()">Re-Boot</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-val');
    const waveEl = document.getElementById('wave-val');
    const shieldFill = document.getElementById('shield-fill');
    const jamBtn = document.getElementById('jam-btn');

    // Game Constants
    const COLORS = {
        rocket: '#ff3300',
        ballistic: '#ff00ff',
        uav: '#00ffaa',
        arrow: '#00f2ff',
        patriot: '#9d00ff',
        ironDome: '#ffffff',
        city: '#0a0a20',
        window: '#ffff00'
    };

    let width, height;
    let score = 0;
    let wave = 1;
    let shield = 100;
    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let frameCount = 0;
    let shakeIntensity = 0;
    let jamActive = 0; // Frames remaining for jam
    let jamCooldown = 0;

    // Entities
    let threats = [];
    let interceptors = [];
    let explosions = [];
    let particles = [];
    let debris = [];
    let buildings = [];

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        generateCity();
    }

    function generateCity() {
        buildings = [];
        const buildingCount = 15;
        const bWidth = width / buildingCount;
        for (let i = 0; i < buildingCount; i++) {
            const h = 40 + Math.random() * 80;
            buildings.push({
                x: i * bWidth,
                y: height - h,
                w: bWidth + 1,
                h: h,
                windows: Array.from({length: 10}, () => ({
                    rx: Math.random() * 0.8 + 0.1,
                    ry: Math.random() * 0.8 + 0.1,
                    on: Math.random() > 0.3
                }))
            });
        }
    }

    class Particle {
        constructor(x, y, color, speedScale = 1) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 10 * speedScale;
            this.vy = (Math.random() - 0.5) * 10 * speedScale;
            this.life = 1.0;
            this.decay = 0.02 + Math.random() * 0.03;
            this.color = color;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= this.decay;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Debris {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = Math.random() * 2;
            this.gravity = 0.15;
            this.life = 1.0;
            this.color = color;
        }
        update() {
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
        }
        draw() {
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.vx * 2, this.y - this.vy * 2);
            ctx.stroke();
        }
    }

    class Threat {
        constructor(type) {
            this.type = type; // 'rocket', 'ballistic', 'uav'
            this.x = Math.random() * width;
            this.y = -50;
            this.targetX = Math.random() * width;
            this.targetY = height - 20;
            this.life = 1;
            
            const dx = this.targetX - this.x;
            const dy = this.targetY - this.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            let speed = 2 + (wave * 0.2);
            if (type === 'ballistic') speed *= 2.5;
            if (type === 'uav') speed *= 0.8;

            this.vx = (dx / dist) * speed;
            this.vy = (dy / dist) * speed;
            this.color = COLORS[type];
            this.trail = [];
            this.angle = 0; // for UAV zig zag
        }

        update() {
            if (this.type === 'uav') {
                if (jamActive > 0) {
                    this.angle += 0.2;
                    this.x += Math.cos(this.angle) * 5;
                    this.y += Math.sin(this.angle) * 2;
                } else {
                    this.angle += 0.05;
                    this.x += Math.sin(this.angle) * 3;
                    this.y += this.vy;
                }
            } else {
                this.x += this.vx;
                this.y += this.vy;
            }

            this.trail.push({x: this.x, y: this.y});
            if (this.trail.length > 20) this.trail.shift();
        }

        draw() {
            // Draw Trail
            ctx.beginPath();
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            for(let i=0; i<this.trail.length; i++) {
                ctx.globalAlpha = i / this.trail.length;
                const p = this.trail[i];
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Draw Head
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Interceptor {
        constructor(targetX, targetY, type) {
            this.startX = width / 2;
            if (type === 'ironDome') this.startX = (targetX < width/2) ? width * 0.2 : width * 0.8;
            
            this.x = this.startX;
            this.y = height - 50;
            this.targetX = targetX;
            this.targetY = targetY;
            this.type = type; // 'arrow', 'patriot', 'ironDome'
            this.progress = 0;
            
            let baseSpeed = 0.02;
            if (type === 'arrow') baseSpeed = 0.04;
            if (type === 'ironDome') baseSpeed = 0.03;
            this.speed = baseSpeed;
            
            this.color = COLORS[type];
        }

        update() {
            this.progress += this.speed;
            this.x = this.startX + (this.targetX - this.startX) * this.progress;
            this.y = (height - 50) + (this.targetY - (height - 50)) * this.progress;
            
            if (this.progress >= 1) {
                createExplosion(this.targetX, this.targetY, this.type);
                return true; // Finished
            }
            return false;
        }

        draw() {
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(this.startX, height - 50);
            ctx.lineTo(this.x, this.y);
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Explosion {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.radius = 0;
            this.maxRadius = (type === 'patriot') ? 100 : 50;
            this.life = 1.0;
            this.color = COLORS[type];
        }
        update() {
            this.radius += (this.maxRadius - this.radius) * 0.2;
            this.life -= 0.03;
            return this.life <= 0;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Outer ring
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius * 1.2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
    }

    function createExplosion(x, y, type) {
        explosions.push(new Explosion(x, y, type));
        shakeIntensity = (type === 'patriot') ? 15 : 8;
        
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(x, y, COLORS[type]));
        }
    }

    function spawnThreat() {
        const r = Math.random();
        let type = 'rocket';
        if (r > 0.8) type = 'uav';
        if (r > 0.92) type = 'ballistic';
        threats.push(new Threat(type));
    }

    function handleInput(e) {
        if (gameState !== 'PLAYING') return;
        
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        // Region based defense
        if (clientY < height * 0.4) {
            // High altitude -> Arrow
            interceptors.push(new Interceptor(clientX, clientY, 'arrow'));
        } else if (clientY < height * 0.75) {
            // Mid altitude -> Patriot
            interceptors.push(new Interceptor(clientX, clientY, 'patriot'));
        }
    }

    function triggerJam() {
        if (jamCooldown > 0 || gameState !== 'PLAYING') return;
        jamActive = 180; // 3 seconds at 60fps
        jamCooldown = 600; // 10 second cooldown
        shakeIntensity = 5;
        // Visual feedback for jam
        for(let i=0; i<50; i++) {
            particles.push(new Particle(width/2, height/2, COLORS.uav, 2));
        }
    }

    function startGame() {
        document.getElementById('start-overlay').classList.add('hidden');
        gameState = 'PLAYING';
        score = 0;
        wave = 1;
        shield = 100;
        threats = [];
        interceptors = [];
        explosions = [];
        particles = [];
        debris = [];
        jamCooldown = 0;
        resize();
    }

    function update() {
        if (gameState !== 'PLAYING') return;

        frameCount++;
        if (jamCooldown > 0) jamCooldown--;
        if (jamActive > 0) jamActive--;

        jamBtn.disabled = jamCooldown > 0;
        jamBtn.innerText = jamCooldown > 0 ? `Recharging (${Math.ceil(jamCooldown/60)}s)` : "GPS Jammer (Space)";

        // Wave management
        const spawnRate = Math.max(10, 60 - (wave * 2));
        if (frameCount % spawnRate === 0) spawnThreat();
        if (frameCount % 600 === 0) {
            wave++;
            waveEl.innerText = wave;
        }

        // Auto Iron Dome logic
        if (frameCount % 45 === 0) {
            const lowThreat = threats.find(t => t.y > height * 0.5 && t.y < height * 0.85);
            if (lowThreat) {
                interceptors.push(new Interceptor(lowThreat.x + (lowThreat.vx * 20), lowThreat.y + (lowThreat.vy * 20), 'ironDome'));
            }
        }

        // Update threats
        for (let i = threats.length - 1; i >= 0; i--) {
            const t = threats[i];
            t.update();

            // Check collision with city
            if (t.y > height - 60) {
                shield -= 15;
                createExplosion(t.x, t.y, 'rocket');
                threats.splice(i, 1);
                shakeIntensity = 25;
                continue;
            }

            // Check collision with explosions
            for (const e of explosions) {
                const dx = t.x - e.x;
                const dy = t.y - e.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < e.radius + 10) {
                    score += (t.type === 'ballistic' ? 50 : 10);
                    scoreEl.innerText = score;
                    
                    // Create Shrapnel
                    const shrapnelCount = (t.type === 'ballistic' ? 8 : 4);
                    for(let s=0; s<shrapnelCount; s++) debris.push(new Debris(t.x, t.y, t.color));
                    
                    threats.splice(i, 1);
                    break;
                }
            }
        }

        // Update debris
        for (let i = debris.length - 1; i >= 0; i--) {
            const d = debris[i];
            d.update();
            if (d.y > height - 40) {
                // Hits city
                shield -= 0.5;
                debris.splice(i, 1);
            } else if (d.x < 0 || d.x > width) {
                debris.splice(i, 1);
            }
        }

        // Update interceptors
        for (let i = interceptors.length - 1; i >= 0; i--) {
            if (interceptors[i].update()) interceptors.splice(i, 1);
        }

        // Update explosions
        for (let i = explosions.length - 1; i >= 0; i--) {
            if (explosions[i].update()) explosions.splice(i, 1);
        }

        // Update particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        // UI
        shieldFill.style.width = shield + '%';
        if (shield <= 0) {
            gameState = 'GAMEOVER';
            document.getElementById('gameover-overlay').classList.remove('hidden');
            document.getElementById('final-score').innerText = `Final Score: ${score}`;
        }

        if (shakeIntensity > 0) shakeIntensity *= 0.9;
    }

    function draw() {
        ctx.fillStyle = COLORS.bg-dark;
        ctx.fillRect(0, 0, width, height);

        ctx.save();
        if (shakeIntensity > 1) {
            ctx.translate((Math.random() - 0.5) * shakeIntensity, (Math.random() - 0.5) * shakeIntensity);
        }

        // City Silhouette
        buildings.forEach(b => {
            ctx.fillStyle = COLORS.city;
            ctx.fillRect(b.x, b.y, b.w, b.h);
            
            // Windows
            b.windows.forEach(w => {
                if (w.on) {
                    ctx.fillStyle = COLORS.window;
                    ctx.globalAlpha = 0.3 + Math.sin(frameCount * 0.05) * 0.2;
                    ctx.fillRect(b.x + b.w * w.rx, b.y + b.h * w.ry, 3, 3);
                }
            });
            ctx.globalAlpha = 1;
        });

        // GPS Jammer Overlay
        if (jamActive > 0) {
            ctx.strokeStyle = COLORS.uav;
            ctx.lineWidth = 2;
            ctx.globalAlpha = (jamActive % 20 < 10) ? 0.2 : 0.05;
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                ctx.arc(width/2, height/2, (frameCount * 5 + i * 100) % width, 0, Math.PI*2);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
        }

        // Entities
        ctx.globalCompositeOperation = 'lighter';
        threats.forEach(t => t.draw());
        interceptors.forEach(i => i.draw());
        explosions.forEach(e => e.draw());
        particles.forEach(p => p.draw());
        debris.forEach(d => d.draw());
        ctx.globalCompositeOperation = 'source-over';

        ctx.restore();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // Events
    window.addEventListener('resize', resize);
    window.addEventListener('mousedown', handleInput);
    window.addEventListener('touchstart', handleInput);
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') triggerJam();
    });
    jamBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        triggerJam();
    });

    // Init
    resize();
    loop();

</script>
</body>
</html>
