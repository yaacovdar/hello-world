<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swarm-ah 🌯! - Tactical Runner</title>
    <style>
        :root {
            --blue-gate: rgba(37, 99, 235, 0.9);
            --red-gate: rgba(220, 38, 38, 0.9);
            --neon-purple: #d8b4fe;
            --health-green: #22c55e;
            --health-red: #ef4444;
            --text-light: #f8fafc;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }

        body {
            background-color: #0f172a;
            color: var(--text-light);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: #1e293b;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        /* Overlays & UI */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.95);
            z-index: 20;
            text-align: center;
            padding: 20px;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #shift-alert, #record-banner {
            position: absolute;
            left: 0;
            width: 100%;
            font-weight: 900;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            text-transform: uppercase;
        }

        #shift-alert { top: 25%; color: #fbbf24; font-size: 2.2rem; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #record-banner { top: 15%; color: #10b981; font-size: 1.8rem; transform: scale(0.8); }
        #record-banner.show { opacity: 1; transform: scale(1); }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .title-primary { background-image: linear-gradient(45deg, #3b82f6, #60a5fa); }
        .title-danger { background-image: linear-gradient(45deg, #ef4444, #f87171); }

        .stat-line {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        .text-danger {
            color: var(--health-red);
            margin-bottom: 20px;
            font-weight: bold;
        }

        .record-text {
            font-size: 0.85rem;
            color: #10b981;
            margin-bottom: 5px;
            font-weight: bold;
            opacity: 0.9;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 80%;
            margin-top: 20px;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-alt {
            background: #7f1d1d; /* Dark Scary Red */
            box-shadow: 0 4px 15px rgba(127, 29, 29, 0.4);
        }

        .btn-pause {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        .btn:active { transform: scale(0.95); }

        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .hud-stats {
            background: rgba(0,0,0,0.5);
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .final-stats-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 10px;
            width: 85%;
        }

        /* Powerup Repository UI */
        #power-repository {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 25;
        }

        .repo-group {
            display: flex;
            gap: 8px;
        }

        .charge-icon {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.4);
            border: 2px solid var(--neon-purple);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 0 12px rgba(216, 180, 254, 0.4);
            transition: opacity 0.3s, transform 0.3s;
        }

        .aqua-icon {
            border-color: #60a5fa;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.4);
            background: rgba(30, 58, 138, 0.4);
        }

        .blink-fast {
            animation: blink 0.2s infinite;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div class="hud-stats">
                <span>DIST: <b id="dist-hud">0</b>m</span>
            </div>
        </div>

        <div id="power-repository">
            <div id="growth-charges" class="repo-group"></div>
            <div id="aqua-status" class="repo-group"></div>
        </div>

        <button class="btn-pause hidden" id="pause-btn">⏸</button>

        <div id="shift-alert">LANES SHIFTING!</div>
        <div id="record-banner">NEW PERSONAL BEST!</div>

        <div id="start-screen" class="overlay">
            <h1 id="game-title" class="title-primary">SWARM-AH!</h1>
            <p class="stat-line">Capture energy. Defend the path.</p>
            
            <div class="btn-container">
                <button class="btn" id="start-classic-btn">Classic Mode</button>
                <button class="btn btn-alt" id="start-challenge-btn">Extra Challenge</button>
            </div>
            
            <div style="margin-top: 25px;">
                <div class="record-text" id="record-classic">Classic Best: 0m</div>
                <div class="record-text" id="record-challenge" style="color: #ef4444;">Challenge Best: 0m</div>
            </div>
        </div>

        <div id="pause-screen" class="overlay hidden">
            <h1 class="title-primary">PAUSED</h1>
            <div class="btn-container">
                <button class="btn" id="resume-btn">Resume Battle</button>
                <button class="btn" id="quit-btn" style="background: #475569;">Quit to Menu</button>
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 id="fail-title" class="title-danger">DEFEATED</h1>
            <p id="fail-reason" class="text-danger"></p>
            
            <div class="final-stats-box">
                <div class="stat-line">Distance: <b id="final-dist">0</b>m</div>
                <div class="record-text" id="record-classic-end">Classic Best: 0m</div>
                <div class="record-text" id="record-challenge-end" style="color: #ef4444;">Challenge Best: 0m</div>
            </div>
            
            <div class="btn-container">
                <button class="btn" id="restart-classic-btn">Retry Classic</button>
                <button class="btn btn-alt" id="restart-challenge-btn">Retry Challenge</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        /**
         * Central Game Configuration
         */
        const CONFIG = {
            GAME: {
                LANE_SHIFT_INTERVAL: 500,
                RECORD_BANNER_DURATION: 5000,
                SUPERPOWER_RARITY_DIST: 900,
            },
            THEME: {
                FONTS: {
                    LOCKED: 'bold 20px var(--font-main)',
                    GATE: '26px serif',
                    CHAOS_EMOJI: '45px serif',
                    ENEMY_PHALANX: '24px serif',
                    SWARM_ENEMY: '16px serif',
                    ELITE_BASE_SIZE: 48,
                    PLAYER: '24px serif',
                    ANN_BASE_SIZE: 120
                },
                COLORS: {
                    BACKGROUND: '#0f172a',
                    GRID: 'rgba(255,255,255,0.05)',
                    BULLET: '#facc15',
                    LOCKED_GATE_BG: 'rgba(71, 85, 105, 0.9)',
                    LOCKED_GATE_STROKE: '#94a3b8',
                    ACTIVE_GATE_BAR: '#60a5fa',
                    BAR_BG: 'rgba(0,0,0,0.5)',
                    BAR_BG_SOLID: 'rgba(0,0,0,0.6)',
                    HEALTH_ENEMY: '#ef4444',
                    HEALTH_PLAYER: '#22c55e',
                    TEXT_WHITE: '#ffffff'
                },
                STYLES: {
                    GRID_DASH: [15, 15]
                }
            },
            PLAYER: {
                START_SCORE: 10,
                SWARM_COUNT: 50,
                MAX_VISIBLE_RUNNERS: 25,
                SCORE_PER_RUNNER: 5,
                COLLISION_HEIGHT: 40,
                Y_OFFSET: 150,
                LERP_FACTOR: 15,
                HEALTH_BAR_WIDTH: 100,
                HEALTH_BAR_HEIGHT: 10,
                FIRE_RATE: 0.05,
            },
            PHYSICS: {
                INITIAL_SPEED: 3.5,
                MAX_SPEED: 14,
                SPEED_SCALING: 3500,
                BULLET_SPEED: 32,
                PARTICLE_DECAY: 2.4,
                FPS_BASELINE: 60,
            },
            ENTITIES: {
                GATE_HEIGHT: 80,
                PHALANX_COUNT: 10,
                PHALANX_SPACING: 60,
                HEALTH_BAR_MAGNITUDE: 0.55,
                HEALTH_BAR_HEIGHT: 8,
                CHANCE_PHALANX: 0.2,
                CHANCE_PERCENTAGE_GATE: 0.4,
                CHANCE_SWARM: 0.5,
                CHANCE_ELITE_BASE: 0.12,
                CHANCE_CHAOS_GATE_NEGATIVE: 0.5,
                DIFFICULTY_BASE_PROB: 0.4,
                DIFFICULTY_SCALING_FACTOR: 1.5,
            },
            ASSETS: {
                PLAYER: '🏃',
                ENEMY: '👹',
                ELITE: '😈',
                POWERUP: '⚡',
                BATTERY: '🔋',
                HAZARD: '🔥',
                LOCKED: '🔒',
                ANNIHILATE: '☢️',
                GROWTHBURST: '🌯',
                AQUA: '💦'
            }
        };

        const ROLES = {
            GROWTH: { color: 'rgba(34, 197, 94, 0.15)', speedMult: 1.6 },
            CHAOS: { color: 'rgba(239, 68, 68, 0.15)', speedMult: 1.0 },
            EVOLUTION: { color: 'rgba(59, 130, 246, 0.15)', speedMult: 0.4 }
        };

        class SaveManager {
            constructor() {
                this.STORAGE_KEY = 'legion_tactical_v2_save';
                this.data = this.load();
            }

            load() {
                try {
                    const saved = localStorage.getItem(this.STORAGE_KEY);
                    return saved ? JSON.parse(saved) : { classic: 0, challenge: 0 };
                } catch (e) {
                    return { classic: 0, challenge: 0 };
                }
            }

            updateDistance(dist, isChallenge) {
                const key = isChallenge ? 'challenge' : 'classic';
                if (dist > this.data[key]) {
                    this.data[key] = dist;
                    this.persist();
                    return true;
                }
                return false;
            }

            persist() {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.data));
                } catch (e) {}
            }

            getRecords() { return this.data; }
        }

        class UIManager {
            constructor() {
                this.elements = {
                    distHud: document.getElementById('dist-hud'),
                    recordBanner: document.getElementById('record-banner'),
                    shiftAlert: document.getElementById('shift-alert'),
                    startScreen: document.getElementById('start-screen'),
                    pauseScreen: document.getElementById('pause-screen'),
                    gameOverScreen: document.getElementById('game-over-screen'),
                    failReason: document.getElementById('fail-reason'),
                    finalDist: document.getElementById('final-dist'),
                    recordClassic: document.getElementById('record-classic'),
                    recordChallenge: document.getElementById('record-challenge'),
                    recordClassicEnd: document.getElementById('record-classic-end'),
                    recordChallengeEnd: document.getElementById('record-challenge-end'),
                    pauseBtn: document.getElementById('pause-btn'),
                    growthCharges: document.getElementById('growth-charges'),
                    aquaStatus: document.getElementById('aqua-status'),
                };
            }

            updateDistance(dist) {
                this.elements.distHud.innerText = Math.floor(dist);
            }

            showStart(records) {
                this.refreshRecords(records);
                this.elements.startScreen.classList.remove('hidden');
                this.elements.pauseScreen.classList.add('hidden');
                this.elements.gameOverScreen.classList.add('hidden');
                this.elements.pauseBtn.classList.add('hidden');
                this.renderGrowthCharges(0);
                this.renderAquaStatus(0);
            }

            showPause() {
                this.elements.pauseScreen.classList.remove('hidden');
                this.elements.pauseBtn.classList.add('hidden');
            }

            hideOverlays() {
                this.elements.startScreen.classList.add('hidden');
                this.elements.pauseScreen.classList.add('hidden');
                this.elements.gameOverScreen.classList.add('hidden');
                this.elements.pauseBtn.classList.remove('hidden');
            }

            showGameOver(dist, reason, records) {
                this.elements.failReason.innerText = reason;
                this.elements.finalDist.innerText = Math.floor(dist);
                this.refreshRecords(records);
                this.elements.gameOverScreen.classList.remove('hidden');
                this.elements.pauseBtn.classList.add('hidden');
            }

            refreshRecords(records) {
                const c = `Classic Best: ${Math.floor(records.classic)}m`;
                const x = `Challenge Best: ${Math.floor(records.challenge)}m`;
                this.elements.recordClassic.innerText = c;
                this.elements.recordChallenge.innerText = x;
                this.elements.recordClassicEnd.innerText = c;
                this.elements.recordChallengeEnd.innerText = x;
            }

            renderGrowthCharges(count) {
                this.elements.growthCharges.innerHTML = '';
                for(let i = 0; i < count; i++) {
                    const icon = document.createElement('div');
                    icon.className = 'charge-icon';
                    icon.innerText = CONFIG.ASSETS.GROWTHBURST;
                    this.elements.growthCharges.appendChild(icon);
                }
            }

            renderAquaStatus(timer) {
                this.elements.aquaStatus.innerHTML = '';
                if (timer > 0) {
                    const icon = document.createElement('div');
                    icon.className = 'charge-icon aqua-icon';
                    if (timer <= 1.0) icon.classList.add('blink-fast');
                    icon.innerText = CONFIG.ASSETS.AQUA;
                    this.elements.aquaStatus.appendChild(icon);
                }
            }

            triggerAlert(type) {
                if (type === 'shift') {
                    this.elements.shiftAlert.style.opacity = '1';
                    setTimeout(() => this.elements.shiftAlert.style.opacity = '0', 2000);
                } else if (type === 'record') {
                    this.elements.recordBanner.classList.add('show');
                    setTimeout(() => this.elements.recordBanner.classList.remove('show'), CONFIG.GAME.RECORD_BANNER_DURATION);
                }
            }
        }

        class Entity {
            constructor(role, lane, y, type) {
                this.role = role;
                this.lane = lane;
                this.y = y;
                this.type = type;
                this.speedMult = role.speedMult;
                this.isCollected = false;
                this.height = CONFIG.ENTITIES.GATE_HEIGHT;
            }
            update(dt, speed) {
                this.y += speed * this.speedMult * dt * CONFIG.PHYSICS.FPS_BASELINE;
            }
        }

        class Gate extends Entity {
            constructor(role, lane, y, op, val, isPositive, isUnlocked = true) {
                super(role, lane, y, 'gate');
                this.op = op;
                this.val = val;
                this.isPositive = isPositive;
                this.isUnlocked = isUnlocked;
                this.isPercentage = (role === ROLES.GROWTH && val > 1) || (op === 'x');
                // Give hazards health so they can be "put out"
                if (!isPositive) {
                    this.health = 25; 
                    this.maxHealth = 25;
                }
            }
        }

        class EvolutionGate extends Gate {
            constructor(role, lane, y, score) {
                const val = 1.3 + Math.random() * 2.7;
                super(role, lane, y, 'x', val, true, false);
                this.type = 'evolutionGate'; 
                this.health = score * 1.75;
                this.maxHealth = this.health;
            }
        }

        class SuperpowerGate extends Gate {
            constructor(role, lane, y, score, powerType) {
                super(role, lane, y, 'ULT', 0, true, false);
                this.type = 'superpowerGate';
                this.powerType = powerType;
                this.health = score * 2.5;
                this.maxHealth = this.health;
            }
        }

        class Enemy extends Entity {
            constructor(role, lane, y, score, distance, forceType = null) {
                super(role, lane, y, 'enemy');
                this.forceType = forceType;
                this.phalanxXOffset = forceType === 'phalanx' ? (Math.random() - 0.5) * 20 : 0;
                const eliteChance = CONFIG.ENTITIES.CHANCE_ELITE_BASE + (distance / 10000);
                this.isElite = forceType === 'phalanx' ? false : (Math.random() < eliteChance);
                const baseH = Math.floor(score * 0.45) + 12;
                this.health = this.isElite ? baseH * 2 : (forceType === 'phalanx' ? score * 0.08 : baseH);
                this.maxHealth = this.health;
                this.isSwarm = Math.random() < CONFIG.ENTITIES.CHANCE_SWARM && !this.isElite && !forceType;
                if (this.isSwarm) {
                    this.swarmOffsets = [];
                    for (let j = 0; j < 15; j++) {
                        this.swarmOffsets.push({ x: (Math.random() - 0.5) * 55, y: (Math.random() - 0.5) * 45 });
                    }
                }
            }
        }

        class Swarm {
            constructor() {
                this.offsets = [];
                for (let i = 0; i < CONFIG.PLAYER.SWARM_COUNT; i++) {
                    this.offsets.push({ x: (Math.random() - 0.5) * 55, y: Math.random() * 45 });
                }
            }
            getActiveCount(score) {
                return Math.min(CONFIG.PLAYER.MAX_VISIBLE_RUNNERS, Math.ceil(score / CONFIG.PLAYER.SCORE_PER_RUNNER));
            }
            getMemberPosition(index, leaderX, leaderY, gameTime) {
                const offset = this.offsets[index % this.offsets.length];
                const timeFactor = gameTime * 5.55; 
                const jitterX = Math.sin(timeFactor + index) * 4;
                const jitterY = Math.cos(timeFactor + index) * 4;
                return { x: leaderX + offset.x + jitterX - 12, y: leaderY + offset.y + jitterY };
            }
        }

        class EntityFactory {
            static createEntities(role, lane, score, distance, lastSuperDist) {
                const spawnY = -100;
                if (role === ROLES.GROWTH) {
                    const val = Math.random() < CONFIG.ENTITIES.CHANCE_PERCENTAGE_GATE ? Math.ceil(score * 0.012) : 1;
                    return [new Gate(role, lane, spawnY, '+', val, true)];
                } else if (role === ROLES.EVOLUTION) {
                    if (distance - lastSuperDist > CONFIG.GAME.SUPERPOWER_RARITY_DIST) {
                        const r = Math.random();
                        const pType = r < 0.33 ? 'ANNIHILATE' : (r < 0.66 ? 'GROWTHBURST' : 'AQUA');
                        return [new SuperpowerGate(role, lane, spawnY, score, pType)];
                    }
                    return [new EvolutionGate(role, lane, spawnY, score)];
                } else {
                    const diffProb = Math.min(0.85, CONFIG.ENTITIES.DIFFICULTY_BASE_PROB + (distance / CONFIG.PHYSICS.SPEED_SCALING * CONFIG.ENTITIES.DIFFICULTY_SCALING_FACTOR));
                    if (Math.random() < CONFIG.ENTITIES.CHANCE_PHALANX) { 
                        const phalanx = [];
                        for (let k = 0; k < CONFIG.ENTITIES.PHALANX_COUNT; k++) {
                            phalanx.push(new Enemy(role, lane, spawnY - (k * CONFIG.ENTITIES.PHALANX_SPACING), score, distance, 'phalanx'));
                        }
                        return phalanx;
                    } else {
                        if (Math.random() < diffProb) return [new Enemy(role, lane, spawnY, score, distance)];
                        else {
                            const isNeg = Math.random() < CONFIG.ENTITIES.CHANCE_CHAOS_GATE_NEGATIVE;
                            const op = isNeg ? '-' : '/';
                            const val = op === '-' ? Math.floor(score * 0.2) + 10 : 2;
                            return [new Gate(role, lane, spawnY, op, val, false)];
                        }
                    }
                }
            }
        }

        class GameEngine {
            constructor(canvas, saveManager) {
                this.canvas = canvas;
                this.ui = new UIManager();
                this.saveManager = saveManager;
                this.active = false;
                this.paused = false;
                this.isChallenge = false;
                this.numLanes = 3;
                this.score = 10;
                this.peakScoreThisRun = 10;
                this.distance = 0;
                this.speed = 3.5;
                this.currentLane = 1;
                this.targetX = 0;
                this.playerX = 0;
                this.laneRoles = [ROLES.GROWTH, ROLES.EVOLUTION, ROLES.CHAOS];
                this.entities = [];
                this.particles = [];
                this.bullets = [];
                this.lastShiftDist = 0;
                this.lastSpawns = [];
                this.bannerShownThisRun = false;
                this.fireTimer = 0;
                this.swarm = new Swarm();
                this.elapsedTime = 0; 
                
                // Superpower State
                this.lastSuperDist = 0;
                this.flashOpacity = 0;
                this.annihilateVisualTimer = 0;
                this.growthBurstRemaining = 0;
                this.nextBurstDist = 0;
                this.aquaTimer = 0;
            }

            start(isChallenge = false) {
                this.isChallenge = isChallenge;
                this.numLanes = isChallenge ? 4 : 3;
                this.score = CONFIG.PLAYER.START_SCORE;
                this.peakScoreThisRun = CONFIG.PLAYER.START_SCORE;
                this.distance = 0;
                this.speed = CONFIG.PHYSICS.INITIAL_SPEED;
                this.currentLane = Math.floor(this.numLanes / 2);
                this.entities = [];
                this.particles = [];
                this.bullets = [];
                this.lastShiftDist = 0;
                this.lastSuperDist = 0;
                this.annihilateVisualTimer = 0;
                this.growthBurstRemaining = 0;
                this.aquaTimer = 0;
                
                if (this.isChallenge) {
                    this.laneRoles = [ROLES.EVOLUTION, ROLES.CHAOS, ROLES.GROWTH, ROLES.CHAOS];
                } else {
                    this.laneRoles = [ROLES.GROWTH, ROLES.EVOLUTION, ROLES.CHAOS];
                }

                for (let i = this.laneRoles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.laneRoles[i], this.laneRoles[j]] = [this.laneRoles[j], this.laneRoles[i]];
                }
                
                this.lastSpawns = new Array(this.numLanes).fill(0).map((_, i) => performance.now() + (i * 450));
                
                this.bannerShownThisRun = false;
                this.fireTimer = 0;
                this.elapsedTime = 0;
                
                this.updateTargetX();
                this.playerX = this.targetX;
                this.active = true;
                this.paused = false;
                this.ui.hideOverlays();
                this.ui.renderGrowthCharges(0);
                this.ui.renderAquaStatus(0);
            }

            togglePause() {
                if (!this.active) return;
                this.paused = !this.paused;
                if (this.paused) this.ui.showPause();
                else this.ui.hideOverlays();
            }

            quit() {
                this.active = false;
                this.paused = false;
                this.ui.showStart(this.saveManager.getRecords());
            }

            triggerSuperpower(type) {
                this.lastSuperDist = this.distance;

                if (type === 'ANNIHILATE') {
                    this.flashOpacity = 1.0;
                    this.annihilateVisualTimer = 0.8; 
                    this.entities.forEach(e => {
                        if (e.type === 'enemy') {
                            e.isCollected = true;
                            for (let i = 0; i < 20; i++) {
                                this.particles.push({ 
                                    x: e.lane * (this.canvas.width / this.numLanes) + (this.canvas.width / this.numLanes / 2), 
                                    y: e.y + 40, vx: (Math.random() - 0.5) * 14, vy: (Math.random() - 0.5) * 14, life: 1.2, color: '#fef08a' 
                                });
                            }
                        }
                    });
                    this.entities = this.entities.filter(e => !e.isCollected);
                } else if (type === 'GROWTHBURST') {
                    this.growthBurstRemaining = 4;
                    this.ui.renderGrowthCharges(this.growthBurstRemaining);
                    this.triggerBurst();
                } else if (type === 'AQUA') {
                    this.aquaTimer = 15;
                    this.ui.renderAquaStatus(this.aquaTimer);
                }
            }

            triggerBurst() {
                this.score *= 4;
                this.growthBurstRemaining--;
                this.ui.renderGrowthCharges(this.growthBurstRemaining);
                this.nextBurstDist = this.distance + 100;
                this.flashOpacity = 0.8;
                for (let i = 0; i < 30; i++) {
                    this.particles.push({ 
                        x: this.playerX, y: this.canvas.height - CONFIG.PLAYER.Y_OFFSET, 
                        vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, 
                        life: 1.5, color: '#d8b4fe' 
                    });
                }
            }

            shuffleLanes(silent = false) {
                const n = this.laneRoles.length;
                if (n < 2) return;
                const i = Math.floor(Math.random() * n);
                let j = Math.floor(Math.random() * (n - 1));
                if (j >= i) j++; 
                const temp = this.laneRoles[i];
                this.laneRoles[i] = this.laneRoles[j];
                this.laneRoles[j] = temp;
                if (!silent) this.ui.triggerAlert('shift');
            }

            getLaneFromCoords(clientX) {
                const rect = this.canvas.getBoundingClientRect();
                return Math.floor(((clientX - rect.left) / rect.width) * this.numLanes);
            }

            moveToLane(targetLane) {
                if (!this.active || this.paused) return;
                if (targetLane < this.currentLane && this.currentLane > 0) this.currentLane--;
                else if (targetLane > this.currentLane && this.currentLane < this.numLanes - 1) this.currentLane++;
                this.updateTargetX();
            }

            updateTargetX() {
                const lw = this.canvas.width / this.numLanes;
                this.targetX = (this.currentLane * lw) + (lw / 2);
            }

            update(dt) {
                if (!this.active || this.paused) return;
                this.elapsedTime += dt;
                this.distance += this.speed * dt * 5; 
                this.speed = Math.min(CONFIG.PHYSICS.MAX_SPEED, CONFIG.PHYSICS.INITIAL_SPEED + (this.distance / CONFIG.PHYSICS.SPEED_SCALING));
                this.peakScoreThisRun = Math.max(this.peakScoreThisRun, this.score);
                
                if (this.flashOpacity > 0) this.flashOpacity -= dt * 2;
                if (this.annihilateVisualTimer > 0) this.annihilateVisualTimer -= dt;
                
                if (this.growthBurstRemaining > 0 && this.distance >= this.nextBurstDist) {
                    this.triggerBurst();
                }

                if (this.aquaTimer > 0) {
                    const prevTimer = this.aquaTimer;
                    this.aquaTimer -= dt;
                    // Trigger UI update when crossing the 1s threshold to start blinking
                    if (prevTimer > 1.0 && this.aquaTimer <= 1.0) {
                        this.ui.renderAquaStatus(this.aquaTimer);
                    } else if (this.aquaTimer <= 0) {
                        this.aquaTimer = 0;
                        this.ui.renderAquaStatus(0);
                    }
                }

                const rec = this.saveManager.getRecords();
                const best = this.isChallenge ? rec.challenge : rec.classic;
                if (!this.bannerShownThisRun && this.distance > best && best > 0) {
                    this.bannerShownThisRun = true;
                    this.ui.triggerAlert('record');
                }

                if (this.distance - this.lastShiftDist > CONFIG.GAME.LANE_SHIFT_INTERVAL) {
                    this.shuffleLanes();
                    this.lastShiftDist = this.distance;
                }
                this.playerX += (this.targetX - this.playerX) * (1 - Math.exp(-CONFIG.PLAYER.LERP_FACTOR * dt));
                this.spawnManager();
                this.combatManager(dt);
                this.entityManager(dt);
                this.particleManager(dt);
                this.ui.updateDistance(this.distance);
            }

            spawnManager() {
                const now = performance.now();
                for (let i = 0; i < this.numLanes; i++) {
                    const role = this.laneRoles[i];
                    const interval = (role === ROLES.EVOLUTION ? 5500 : (role === ROLES.GROWTH ? 700 : 1800)) / ( (this.speed * role.speedMult) / CONFIG.PHYSICS.INITIAL_SPEED);
                    if (now - this.lastSpawns[i] > interval) {
                        this.entities.push(...EntityFactory.createEntities(role, i, this.score, this.distance, this.lastSuperDist));
                        this.lastSpawns[i] = now;
                    }
                }
            }

            combatManager(dt) {
                const playerY = this.canvas.height - CONFIG.PLAYER.Y_OFFSET;
                let target = null;
                let minDist = Infinity;
                
                this.entities.forEach(e => {
                    // Aqua allows targeting fire hazards (negative gates)
                    const isShootableHazard = this.aquaTimer > 0 && e.type === 'gate' && !e.isPositive;
                    
                    if (((e.type === 'enemy') || (e.type === 'evolutionGate') || (e.type === 'superpowerGate' && !e.isUnlocked) || isShootableHazard) && e.lane === this.currentLane && e.y < playerY - 40) {
                        const d = playerY - e.y;
                        if (d < minDist) { minDist = d; target = e; }
                    }
                });

                if (target) {
                    let damage = ((this.score * 0.72) + 21) * dt;
                    if (this.aquaTimer > 0) damage *= 1.25; // Pressurized firepower multiplier
                    
                    target.health -= damage;
                    this.fireTimer += dt;
                    if (this.fireTimer >= CONFIG.PLAYER.FIRE_RATE) {
                        this.bullets.push({ x: this.playerX + (Math.random() - 0.5) * 20, y: playerY - 20, targetY: target.y + 40 });
                        this.fireTimer = 0;
                    }
                    if (target.health <= 0) {
                        if (target.type === 'enemy') {
                            target.isCollected = true;
                            for (let i = 0; i < 12; i++) {
                                this.particles.push({ 
                                    x: target.lane * (this.canvas.width / this.numLanes) + (this.canvas.width / this.numLanes / 2), 
                                    y: target.y + 40, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, life: 1, color: '#ef4444' 
                                });
                            }
                            this.score *= target.isElite ? 2.5 : 1.012;
                            this.entities = this.entities.filter(ent => ent !== target);
                        } else if (target.type === 'superpowerGate') {
                            this.triggerSuperpower(target.powerType);
                            this.entities = this.entities.filter(ent => ent !== target);
                        } else if (target.type === 'evolutionGate') {
                            if (!target.isUnlocked) {
                                target.isUnlocked = true;
                                target.health = target.maxHealth * 0.8;
                                target.maxHealth = target.health;
                            } else {
                                this.score *= target.val;
                                for (let i = 0; i < 15; i++) {
                                    this.particles.push({ 
                                        x: target.lane * (this.canvas.width / this.numLanes) + (this.canvas.width / this.numLanes / 2), 
                                        y: target.y + 40, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, life: 1.5, color: '#60a5fa' 
                                    });
                                }
                                this.entities = this.entities.filter(ent => ent !== target);
                            }
                        } else if (target.type === 'gate' && !target.isPositive) {
                            // Hazard Extinguished!
                            for (let i = 0; i < 10; i++) {
                                this.particles.push({ 
                                    x: target.lane * (this.canvas.width / this.numLanes) + (this.canvas.width / this.numLanes / 2), 
                                    y: target.y + 40, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, life: 1, color: '#60a5fa' 
                                });
                            }
                            this.entities = this.entities.filter(ent => ent !== target);
                        }
                    }
                }
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.y -= CONFIG.PHYSICS.BULLET_SPEED * dt * CONFIG.PHYSICS.FPS_BASELINE; 
                    if (b.y < b.targetY) this.bullets.splice(i, 1);
                }
            }

            entityManager(dt) {
                const playerY = this.canvas.height - CONFIG.PLAYER.Y_OFFSET;
                for (let i = this.entities.length - 1; i >= 0; i--) {
                    const e = this.entities[i];
                    e.update(dt, this.speed);
                    if (e.y > this.canvas.height) {
                        if (e.type === 'enemy') { this.endGame("DEFENSES BREACHED!"); return; }
                        this.entities.splice(i, 1);
                        continue;
                    }
                    if (!e.isCollected && e.lane === this.currentLane && e.y + e.height > playerY && e.y < playerY + CONFIG.PLAYER.COLLISION_HEIGHT) {
                        if ((e.type === 'gate' || e.type === 'evolutionGate')) {
                            const skipHazard = !e.isPositive && this.aquaTimer > 0;
                            if (e.isUnlocked && !skipHazard) {
                                e.isCollected = true;
                                if (e.op === '+') this.score += e.val;
                                else if (e.op === '-') this.score -= e.val;
                                else if (e.op === 'x') this.score *= e.val;
                                else if (e.op === '/') this.score = Math.floor(this.score / e.val);
                                this.entities.splice(i, 1);
                            } else if (skipHazard) {
                                // Just ignore the hazard collision visually and logically
                                e.isCollected = true;
                                this.entities.splice(i, 1);
                            }
                        } else if (e.type === 'enemy') {
                            this.score -= Math.ceil(e.health);
                            this.entities.splice(i, 1);
                        }
                        if (this.score <= 0) { this.endGame("SWARM ANNIHILATED!"); return; }
                    }
                }
            }

            particleManager(dt) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx * dt * CONFIG.PHYSICS.FPS_BASELINE; 
                    p.y += p.vy * dt * CONFIG.PHYSICS.FPS_BASELINE; 
                    p.life -= dt * (1/p.life);
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            endGame(reason) {
                this.active = false;
                this.paused = false;
                this.saveManager.updateDistance(this.distance, this.isChallenge);
                this.ui.showGameOver(this.distance, reason, this.saveManager.getRecords());
            }
        }

        class Renderer {
            constructor(canvas, ctx) {
                this.canvas = canvas;
                this.ctx = ctx;
                this.STRATEGIES = {
                    gate: (ctx, e, lw, engine) => this.drawStandardGate(ctx, e, lw, engine),
                    evolutionGate: (ctx, e, lw) => this.drawEvolutionGate(ctx, e, lw),
                    superpowerGate: (ctx, e, lw) => this.drawSuperpowerGate(ctx, e, lw),
                    enemy: (ctx, e, lw, engine) => this.drawEnemy(ctx, e, lw, engine),
                    player: (ctx, engine) => this.drawPlayer(ctx, engine)
                };
            }

            draw(engine) {
                const ctx = this.ctx;
                const theme = CONFIG.THEME;
                const lw = this.canvas.width / engine.laneRoles.length;

                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                ctx.fillStyle = theme.COLORS.BACKGROUND;
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'alphabetic';

                for (let i = 0; i < engine.laneRoles.length; i++) {
                    const role = engine.laneRoles[i];
                    ctx.fillStyle = role.color;
                    ctx.fillRect(i * lw, 0, lw, this.canvas.height);
                }

                ctx.strokeStyle = theme.COLORS.GRID;
                ctx.setLineDash(theme.STYLES.GRID_DASH);
                for (let i = 1; i < engine.laneRoles.length; i++) {
                    ctx.beginPath(); ctx.moveTo(i * lw, 0); ctx.lineTo(i * lw, this.canvas.height); ctx.stroke();
                }
                ctx.setLineDash([]);

                engine.entities.forEach(e => {
                    const s = this.STRATEGIES[e.type];
                    if (s) {
                        ctx.save();
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'alphabetic';
                        s(ctx, e, lw, engine);
                        ctx.restore();
                    }
                });

                ctx.fillStyle = theme.COLORS.BULLET;
                engine.bullets.forEach(b => { 
                    ctx.beginPath(); 
                    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); 
                    ctx.fill(); 
                });

                engine.particles.forEach(p => {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
                });
                ctx.globalAlpha = 1;

                this.STRATEGIES.player(ctx, engine);

                if (engine.flashOpacity > 0) {
                    ctx.fillStyle = `rgba(216, 180, 254, ${engine.flashOpacity})`;
                    ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }

                if (engine.annihilateVisualTimer > 0) {
                    ctx.save();
                    ctx.translate(this.canvas.width / 2, this.canvas.height / 2);
                    const sc = 0.5 + (1 - engine.annihilateVisualTimer / 0.8) * 1.5;
                    ctx.font = `bold ${Math.floor(CONFIG.THEME.FONTS.ANN_BASE_SIZE * sc)}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.globalAlpha = engine.annihilateVisualTimer / 0.8;
                    ctx.fillText(CONFIG.ASSETS.ANNIHILATE, 0, 0);
                    ctx.restore();
                }
            }

            _drawGateShell(ctx, x, y, width, height, radius, bgColor, strokeColor) {
                ctx.beginPath();
                ctx.roundRect(x + 10, y, width - 20, height, radius);
                ctx.fillStyle = bgColor; ctx.fill();
                ctx.strokeStyle = strokeColor; ctx.lineWidth = 3; ctx.stroke();
            }

            drawStandardGate(ctx, e, lw, engine) {
                const x = e.lane * lw;
                const theme = CONFIG.THEME;
                if (e.role === ROLES.GROWTH) {
                    const gateW = lw * 0.6;
                    const off = (lw - gateW) / 2;
                    this._drawGateShell(ctx, x + off - 10, e.y, gateW + 20, e.height, 25, 'rgba(37, 99, 235, 0.9)', '#60a5fa');
                    ctx.fillStyle = theme.COLORS.TEXT_WHITE;
                    ctx.font = theme.FONTS.GATE;
                    ctx.fillText(e.isPercentage ? CONFIG.ASSETS.POWERUP.repeat(3) : CONFIG.ASSETS.POWERUP, x + lw / 2, e.y + 45);
                } else { 
                    ctx.fillStyle = theme.COLORS.TEXT_WHITE;
                    ctx.font = theme.FONTS.CHAOS_EMOJI;
                    ctx.fillText(CONFIG.ASSETS.HAZARD, x + lw / 2, e.y + 50);

                    // If Aqua is active, show health bar for hazards to signal they can be extinguished
                    if (engine.aquaTimer > 0) {
                        const gateW = lw * 0.6;
                        const off = (lw - gateW) / 2;
                        const barW = gateW - 20, barH = 6, barX = x + off + 10, barY = e.y + 65;
                        ctx.fillStyle = theme.COLORS.BAR_BG;
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 3); ctx.fill();
                        ctx.fillStyle = '#60a5fa';
                        ctx.beginPath(); ctx.roundRect(barX, barY, barW * (e.health / e.maxHealth), barH, 3); ctx.fill();
                    }
                }
            }

            drawEvolutionGate(ctx, e, lw) {
                const x = e.lane * lw;
                const theme = CONFIG.THEME;
                const isL = !e.isUnlocked;
                const gateW = lw * 0.6;
                const off = (lw - gateW) / 2;
                
                this._drawGateShell(ctx, x + off - 10, e.y, gateW + 20, e.height, 25, isL ? theme.COLORS.LOCKED_GATE_BG : 'rgba(37, 99, 235, 0.9)', isL ? theme.COLORS.LOCKED_GATE_STROKE : '#60a5fa');
                ctx.fillStyle = theme.COLORS.TEXT_WHITE;

                const barW = gateW - 20, barH = 8, barX = x + off + 10, barY = e.y + 58;
                ctx.fillStyle = theme.COLORS.BAR_BG;
                ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
                ctx.fillStyle = isL ? theme.COLORS.TEXT_WHITE : theme.COLORS.ACTIVE_GATE_BAR;
                ctx.beginPath(); ctx.roundRect(barX, barY, barW * (e.health / e.maxHealth), barH, 4); ctx.fill();

                if (isL) {
                    ctx.font = theme.FONTS.LOCKED;
                    ctx.fillText(CONFIG.ASSETS.LOCKED, x + lw / 2, e.y + 35);
                } else {
                    ctx.font = theme.FONTS.GATE;
                    const bat = e.val > 3 ? CONFIG.ASSETS.BATTERY.repeat(3) : (e.val > 2 ? CONFIG.ASSETS.BATTERY.repeat(2) : CONFIG.ASSETS.BATTERY);
                    ctx.fillText(bat, x + lw / 2, e.y + 45);
                }
            }

            drawSuperpowerGate(ctx, e, lw) {
                const x = e.lane * lw;
                const theme = CONFIG.THEME;
                const gateW = lw * 0.6;
                const off = (lw - gateW) / 2;
                
                this._drawGateShell(ctx, x + off - 10, e.y, gateW + 20, e.height, 25, 'rgba(147, 51, 234, 0.9)', '#d8b4fe');
                ctx.fillStyle = theme.COLORS.TEXT_WHITE;
                ctx.font = theme.FONTS.LOCKED;
                ctx.fillText(CONFIG.ASSETS[e.powerType], x + lw / 2, e.y + 35);
                
                const barW = gateW - 20, barH = 8, barX = x + off + 10, barY = e.y + 58;
                ctx.fillStyle = theme.COLORS.BAR_BG;
                ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
                ctx.fillStyle = '#d8b4fe';
                ctx.beginPath(); ctx.roundRect(barX, barY, barW * (e.health / e.maxHealth), barH, 4); ctx.fill();
            }

            drawEnemy(ctx, e, lw, engine) {
                const x = e.lane * lw;
                const theme = CONFIG.THEME;
                const barW = lw * CONFIG.ENTITIES.HEALTH_BAR_MAGNITUDE, barH = CONFIG.ENTITIES.HEALTH_BAR_HEIGHT, barX = x + lw/2 - barW/2, barY = e.y - 15;
                
                ctx.fillStyle = theme.COLORS.BAR_BG;
                ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
                ctx.fillStyle = theme.COLORS.HEALTH_ENEMY;
                ctx.beginPath(); ctx.roundRect(barX, barY, barW * (e.health / e.maxHealth), barH, 4); ctx.fill();
                
                if (e.isSwarm) {
                    ctx.font = theme.FONTS.SWARM_ENEMY;
                    const tf = engine.elapsedTime * 6.67; 
                    const visiblePop = Math.max(1, Math.ceil(e.swarmOffsets.length * (e.health / e.maxHealth)));
                    
                    for (let i = 0; i < visiblePop; i++) {
                        const o = e.swarmOffsets[i];
                        const jx = Math.sin(tf + i) * 3, jy = Math.cos(tf + i) * 3;
                        ctx.fillText(CONFIG.ASSETS.ENEMY, x + lw/2 + o.x + jx, e.y + 40 + o.y + jy);
                    }
                } else if (e.forceType === 'phalanx') {
                    ctx.font = theme.FONTS.ENEMY_PHALANX;
                    ctx.fillText(CONFIG.ASSETS.ENEMY, x + lw/2 + e.phalanxXOffset, e.y + 45);
                } else {
                    const sc = (0.6 + (Math.max(0, e.health) / e.maxHealth) * 0.6) * (e.isElite ? 1.4 : 1.1);
                    ctx.font = `${Math.floor(theme.FONTS.ELITE_BASE_SIZE * sc)}px serif`; 
                    ctx.fillText(e.isElite ? CONFIG.ASSETS.ELITE : CONFIG.ASSETS.ENEMY, x + lw/2, e.y + 55);
                }
            }

            drawPlayer(ctx, engine) {
                const theme = CONFIG.THEME;
                const pY = this.canvas.height - CONFIG.PLAYER.Y_OFFSET;
                const sc = engine.swarm.getActiveCount(engine.score);
                
                ctx.save();
                ctx.font = theme.FONTS.PLAYER; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'alphabetic';

                // Aqua Power Aura
                if (engine.aquaTimer > 0) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(96, 165, 250, 0.8)';
                    ctx.fillStyle = 'rgba(96, 165, 250, 0.15)';
                    ctx.beginPath();
                    ctx.ellipse(engine.playerX, pY + 15, 60, 45, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = theme.COLORS.TEXT_WHITE;
                for (let i = 0; i < sc; i++) {
                    const pos = engine.swarm.getMemberPosition(i, engine.playerX, pY, engine.elapsedTime);
                    ctx.fillText(CONFIG.ASSETS.PLAYER, pos.x, pos.y);
                }
                ctx.restore();

                const barW = CONFIG.PLAYER.HEALTH_BAR_WIDTH, barH = CONFIG.PLAYER.HEALTH_BAR_HEIGHT;
                const barX = engine.playerX - barW / 2, barY = pY - 35;
                ctx.fillStyle = theme.COLORS.BAR_BG_SOLID;
                ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 5); ctx.fill();
                ctx.fillStyle = theme.COLORS.HEALTH_PLAYER;
                ctx.beginPath(); ctx.roundRect(barX, barY, barW * (engine.score / engine.peakScoreThisRun), barH, 5); ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1; ctx.stroke();
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const save = new SaveManager();
        const game = new GameEngine(canvas, save);
        const renderer = new Renderer(canvas, ctx);

        window.addEventListener('resize', () => {
            const container = document.getElementById('game-container');
            if (container) {
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                game.updateTargetX();
                game.playerX = game.targetX;
            }
        });
        window.dispatchEvent(new Event('resize'));

        document.getElementById('start-classic-btn').addEventListener('click', () => game.start(false));
        document.getElementById('start-challenge-btn').addEventListener('click', () => game.start(true));
        document.getElementById('restart-classic-btn').addEventListener('click', () => game.start(false));
        document.getElementById('restart-challenge-btn').addEventListener('click', () => game.start(true));
        document.getElementById('pause-btn').addEventListener('click', (e) => { e.stopPropagation(); game.togglePause(); });
        document.getElementById('resume-btn').addEventListener('click', () => game.togglePause());
        document.getElementById('quit-btn').addEventListener('click', () => game.quit());

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') game.moveToLane(game.currentLane - 1);
            if (e.key === 'ArrowRight') game.moveToLane(game.currentLane + 1);
            if (e.key === 'Escape' || e.key === 'p') game.togglePause();
        });
        canvas.addEventListener('mousedown', (e) => game.moveToLane(game.getLaneFromCoords(e.clientX)));
        canvas.addEventListener('touchstart', (e) => {
            game.moveToLane(game.getLaneFromCoords(e.touches[0].clientX));
            e.preventDefault();
        }, { passive: false });

        let lastTime = performance.now();
        function loop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            game.update(dt);
            renderer.draw(game);
            requestAnimationFrame(loop);
        }

        game.ui.showStart(save.getRecords());
        requestAnimationFrame(loop);
    </script>
</body>
</html>
