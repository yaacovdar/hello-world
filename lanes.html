<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Legion - Tactical Runner</title>
    <style>
        :root {
            --blue-gate: rgba(37, 99, 235, 0.9);
            --red-gate: rgba(220, 38, 38, 0.9);
            --text-light: #f8fafc;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: none;
        }

        body {
            background-color: #0f172a;
            color: var(--text-light);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: #1e293b;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.9);
            z-index: 20;
            text-align: center;
            padding: 20px;
            transition: opacity 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #shift-alert, #record-banner {
            position: absolute;
            left: 0;
            width: 100%;
            font-weight: 900;
            text-align: center;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            text-transform: uppercase;
        }

        #shift-alert { top: 25%; color: #fbbf24; font-size: 2.2rem; text-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #record-banner { top: 15%; color: #10b981; font-size: 1.8rem; transform: scale(0.8); }
        #record-banner.show { opacity: 1; transform: scale(1); }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-line {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        .record-text {
            font-size: 0.85rem;
            color: #10b981;
            margin-bottom: 20px;
            font-weight: bold;
            opacity: 0.9;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            margin-top: 10px;
        }

        .btn:hover { background: #2563eb; transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        #hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .hud-stats {
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            gap: 15px;
        }

        .final-stats-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            width: 85%;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div class="hud-stats">
                <span>DIST: <b id="dist-hud">0</b>m</span>
                <span>TIME: <b id="time-hud">00:00</b></span>
            </div>
        </div>

        <div id="shift-alert">LANES SHIFTING!</div>
        <div id="record-banner">NEW PERSONAL BEST!</div>

        <div id="start-screen" class="overlay">
            <h1>MATH LEGION</h1>
            <p class="stat-line">Grow the swarm. Defend the path.</p>
            <button class="btn" id="start-btn">BATTLE START</button>
            <div class="record-text" id="start-records">Records: Dist 0 | Army 0 | Time 00:00</div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 id="fail-title" style="background: linear-gradient(45deg, #ef4444, #f87171); -webkit-background-clip: text;">DEFEATED</h1>
            <p id="fail-reason" style="color: #f87171; margin-bottom: 20px; font-weight: bold;"></p>
            
            <div class="final-stats-box">
                <div class="stat-line">Distance: <b id="final-dist">0</b>m</div>
                <div class="stat-line">Peak Army: <b id="final-army">0</b></div>
                <div class="stat-line">Time: <b id="final-time">00:00</b></div>
            </div>

            <div class="record-text" id="end-records">Bests: Dist 0 | Army 0 | Time 00:00</div>
            
            <button class="btn" id="restart-btn">RETRY BATTLE</button>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // Records kept in memory for the current session
        let records = { distance: 0, army: 0, time: 0 };
        let bannerShownThisRun = false;

        const compactFormatter = new Intl.NumberFormat('en-US', { notation: 'compact', compactDisplay: 'short', maximumFractionDigits: 1 });

        function formatVal(num) {
            num = Math.max(0, Math.floor(num));
            if (num >= 1e15) return num.toExponential(2);
            return compactFormatter.format(num);
        }

        function formatT(ms) {
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function updateRecordsUI() {
            const str = `Bests: Dist ${formatVal(records.distance)} | Army ${formatVal(records.army)} | Time ${formatT(records.time * 1000)}`;
            document.getElementById('start-records').innerText = str;
            document.getElementById('end-records').innerText = str;
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const distHUD = document.getElementById('dist-hud');
        const timeHUD = document.getElementById('time-hud');
        const recordBanner = document.getElementById('record-banner');

        const LANES = 3;
        const INITIAL_SPEED = 3.5;
        const MAX_SPEED = 14;
        const PLAYER_SIZE = 40; // Collision box height

        const ROLES = {
            GROWTH: { color: 'rgba(34, 197, 94, 0.15)', speedMult: 1.6 },
            CHAOS: { color: 'rgba(239, 68, 68, 0.15)', speedMult: 1.0 },
            EVOLUTION: { color: 'rgba(59, 130, 246, 0.15)', speedMult: 0.4 }
        };

        let laneRoles = [ROLES.GROWTH, ROLES.CHAOS, ROLES.EVOLUTION];
        let gameActive = false;
        let score = 10;
        let peakArmy = 10;
        let distance = 0;
        let speed = INITIAL_SPEED;
        let currentLane = 1;
        let startTime = 0;
        let runTime = 0;
        let targetX = 0, playerX = 0;
        let entities = [], particles = [], bullets = [];
        let lastShiftDist = 0, lastSpawns = [0, 0, 0];

        // Organic Swarm for Player
        const playerSwarm = [];
        for (let i = 0; i < 50; i++) playerSwarm.push({ x: (Math.random() - 0.5) * 55, y: Math.random() * 45 });

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            updateTargetX();
            playerX = targetX;
        }
        window.addEventListener('resize', resize);
        resize();

        function updateTargetX() { targetX = (currentLane * (canvas.width / LANES)) + (canvas.width / LANES / 2); }

        function shuffleLanes() {
            let options = [ROLES.GROWTH, ROLES.CHAOS, ROLES.EVOLUTION];
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            laneRoles = options;
            const alert = document.getElementById('shift-alert');
            alert.style.opacity = '1';
            setTimeout(() => alert.style.opacity = '0', 2000);
        }

        // Keyboard controls restored
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' && currentLane > 0) {
                currentLane--;
                updateTargetX();
            } else if (e.key === 'ArrowRight' && currentLane < 2) {
                currentLane++;
                updateTargetX();
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            const clickedLane = Math.floor((e.clientX - canvas.getBoundingClientRect().left) / canvas.width * 3);
            if (clickedLane < currentLane && currentLane > 0) currentLane--;
            else if (clickedLane > currentLane && currentLane < 2) currentLane++;
            updateTargetX();
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            const clickedLane = Math.floor((e.touches[0].clientX - canvas.getBoundingClientRect().left) / canvas.width * 3);
            if (clickedLane < currentLane && currentLane > 0) currentLane--;
            else if (clickedLane > currentLane && currentLane < 2) currentLane++;
            updateTargetX();
            e.preventDefault();
        }, { passive: false });

        class Entity {
            constructor(role, lane, y, forceType = null) {
                this.role = role;
                this.lane = lane;
                this.y = y;
                this.width = canvas.width / LANES;
                this.height = 80;
                this.isCollected = false;
                this.isUnlocked = true;
                this.speedMult = role.speedMult;
                this.forceType = forceType;
                
                // Fixed randomized offset for phalanx parts, no jitter
                this.phalanxXOffset = forceType === 'phalanx' ? (Math.random() - 0.5) * 20 : 0;

                if (role === ROLES.GROWTH) {
                    this.type = 'gate'; this.op = '+';
                    this.val = Math.random() > 0.4 ? 1 : Math.ceil(score * 0.012);
                    this.isPositive = true;
                } else if (role === ROLES.EVOLUTION) {
                    this.type = 'gate'; this.op = 'x';
                    this.val = 1.3 + Math.random() * 2.7;
                    this.isPositive = true; this.isUnlocked = false;
                    this.health = score * 1.75; this.maxHealth = this.health;
                    this.isSecret = Math.random() > 0.45;
                } else { // CHAOS
                    const diffProb = Math.min(0.85, 0.4 + (distance / 5000));
                    const isEnemy = this.forceType === 'phalanx' ? true : Math.random() < diffProb;
                    
                    if (isEnemy) {
                        this.type = 'enemy';
                        this.isElite = forceType === 'phalanx' ? false : (Math.random() > 0.88 - (distance / 10000));
                        const baseH = Math.floor(score * 0.45) + 12;
                        this.health = this.isElite ? baseH * 2 : (this.forceType === 'phalanx' ? score * 0.08 : baseH);
                        this.maxHealth = this.health;
                        this.isSwarm = Math.random() > 0.5 && !this.isElite && !this.forceType;
                        if (this.isSwarm) {
                            this.swarmOffsets = [];
                            for (let j = 0; j < 15; j++) this.swarmOffsets.push({ x: (Math.random() - 0.5) * 55, y: (Math.random() - 0.5) * 45 });
                        }
                    } else {
                        this.type = 'gate'; this.op = Math.random() > 0.5 ? '-' : '/';
                        this.val = this.op === '-' ? Math.floor(score * 0.2) + 10 : 2;
                        this.isPositive = false;
                    }
                }
            }

            update() { this.y += speed * this.speedMult; }

            draw() {
                const x = this.lane * this.width;
                if (this.type === 'gate') {
                    const isLocked = !this.isUnlocked && this.role === ROLES.EVOLUTION;
                    ctx.fillStyle = isLocked ? 'rgba(71, 85, 105, 0.9)' : (this.isPositive ? 'rgba(37, 99, 235, 0.9)' : 'rgba(220, 38, 38, 0.9)');
                    ctx.fillRect(x + 5, this.y, this.width - 10, this.height);
                    ctx.strokeStyle = isLocked ? '#94a3b8' : (this.isPositive ? '#60a5fa' : '#f87171');
                    ctx.lineWidth = 4; ctx.strokeRect(x + 5, this.y, this.width - 10, this.height);
                    if (isLocked) {
                        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 16px var(--font-main)';
                        ctx.fillText('🔒 LOCKED', x + this.width / 2, this.y + 25);
                        ctx.font = 'bold 18px var(--font-main)';
                        ctx.fillText(this.isSecret ? "???" : `+${Math.round((this.val-1)*100)}%`, x + this.width / 2, this.y + 48);
                        ctx.fillStyle = '#1e293b'; ctx.fillRect(x + 20, this.y + 60, this.width - 40, 8);
                        ctx.fillStyle = '#60a5fa'; ctx.fillRect(x + 20, this.y + 60, (this.width - 40) * (this.health / this.maxHealth), 8);
                    } else {
                        let sym = this.op === '+' ? '➕' : (this.op === '-' ? '➖' : (this.op === 'x' ? '✖️' : '➗'));
                        ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '22px serif';
                        ctx.fillText(sym, x + this.width / 2, this.y + 35);
                        ctx.font = 'bold 24px var(--font-main)';
                        ctx.fillText(this.op === 'x' ? `+${Math.round((this.val-1)*100)}%` : formatVal(this.val), x + this.width / 2, this.y + 65);
                    }
                } else {
                    const hStr = formatVal(this.health);
                    ctx.font = '900 18px var(--font-main)';
                    const hW = ctx.measureText(hStr).width;
                    const bW = Math.max(50, hW + 16);
                    ctx.fillStyle = this.isElite ? '#fbbf24' : '#ef4444';
                    ctx.beginPath(); ctx.roundRect(x + this.width/2 - bW/2, this.y - 15, bW, 24, 6); ctx.fill();
                    ctx.fillStyle = this.isElite ? '#000' : 'white';
                    ctx.textAlign = 'center'; ctx.fillText(hStr, x + this.width/2, this.y + 3);
                    
                    if (this.isSwarm) {
                        ctx.font = '18px serif';
                        this.swarmOffsets.forEach((off, i) => {
                            const jx = Math.sin(Date.now() / 150 + i) * 3;
                            const jy = Math.cos(Date.now() / 150 + i) * 3;
                            ctx.fillText('👹', x + this.width/2 + off.x + jx, this.y + 40 + off.y + jy);
                        });
                    } else if (this.forceType === 'phalanx') {
                        // Phalanx type: Smaller (24px), fixed randomized offset, no jitter
                        ctx.font = '24px serif';
                        ctx.fillText('👹', x + this.width/2 + this.phalanxXOffset, this.y + 45);
                    } else {
                        const sc = (0.6 + (Math.max(0, this.health) / this.maxHealth) * 0.6) * (this.isElite ? 1.7 : 1.1);
                        ctx.save(); ctx.translate(x + this.width/2, this.y + 45); ctx.scale(sc, sc);
                        ctx.font = '48px serif'; ctx.textAlign = 'center';
                        ctx.fillText(this.isElite ? '🐉' : '👹', 0, 10);
                        ctx.restore();
                    }
                }
            }
        }

        function spawn() {
            const now = Date.now();
            for (let i = 0; i < 3; i++) {
                const role = laneRoles[i];
                const interval = (role === ROLES.EVOLUTION ? 5500 : (role === ROLES.GROWTH ? 700 : 1800)) / ( (speed * role.speedMult) / INITIAL_SPEED);
                if (now - lastSpawns[i] > interval) {
                    if (role === ROLES.CHAOS && Math.random() > 0.8) {
                        const size = 10;
                        for (let k = 0; k < size; k++) entities.push(new Entity(role, i, -100 - (k * 60), 'phalanx'));
                    } else {
                        entities.push(new Entity(role, i, -100));
                    }
                    lastSpawns[i] = now;
                }
            }
        }

        function handleCombat() {
            const playerY = canvas.height - 150;
            let target = null; let minDist = Infinity;
            entities.forEach(e => {
                if (((e.type === 'enemy') || (e.type === 'gate' && !e.isUnlocked)) && e.lane === currentLane && e.y < playerY - 40) {
                    const d = playerY - e.y;
                    if (d < minDist) { minDist = d; target = e; }
                }
            });
            if (target) {
                target.health -= (score * 0.012) + 0.35;
                if (Date.now() % 3 === 0) bullets.push({ x: playerX + (Math.random() - 0.5) * 20, y: playerY - 20, targetY: target.y + 40 });
                if (target.health <= 0) {
                    if (target.type === 'enemy') {
                        target.isCollected = true;
                        particles.push(...Array(15).fill(0).map(() => ({ x: target.lane * (canvas.width / LANES) + (canvas.width / LANES / 2), y: target.y + 40, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, life: 1, color: target.isElite ? '#fbbf24' : '#facc15' })));
                        score *= target.isElite ? 2.5 : 1.012;
                        entities = entities.filter(ent => ent !== target);
                    } else { target.isUnlocked = true; }
                }
            }
        }

        function update() {
            if (!gameActive) return;
            runTime = Date.now() - startTime;
            distance += speed / 12;
            speed = Math.min(MAX_SPEED, INITIAL_SPEED + (distance / 3500));
            peakArmy = Math.max(peakArmy, score);
            distHUD.innerText = formatVal(distance);
            timeHUD.innerText = formatT(runTime);
            
            // Record Banner Logic (Triggers exactly once per run)
            if (!bannerShownThisRun && (distance > records.distance || score > records.army || (runTime / 1000) > records.time)) {
                bannerShownThisRun = true;
                recordBanner.classList.add('show');
                setTimeout(() => recordBanner.classList.remove('show'), 5000);
            }

            if (distance - lastShiftDist > 500) { shuffleLanes(); lastShiftDist = distance; }
            playerX += (targetX - playerX) * 0.25;
            spawn(); handleCombat();
            
            bullets.forEach((b, i) => { b.y -= 32; if (b.y < b.targetY) bullets.splice(i, 1); });
            entities.forEach((e, idx) => {
                e.update();
                if (e.type === 'enemy' && e.y > canvas.height) { endGame("DEFENSES BREACHED!"); return; }
                if (!e.isCollected && e.lane === currentLane && e.y + e.height > (canvas.height - 150) && e.y < (canvas.height - 150) + PLAYER_SIZE) {
                    if (e.type === 'gate' && e.isUnlocked) {
                        e.isCollected = true;
                        if (e.op === '+') score += e.val;
                        else if (e.op === '-') score -= e.val;
                        else if (e.op === 'x') score *= e.val;
                        else if (e.op === '/') score = Math.floor(score / e.val);
                        entities.splice(idx, 1);
                    } else if (e.type === 'enemy') {
                        score -= Math.ceil(e.health);
                        entities.splice(idx, 1);
                    }
                    if (score <= 0) endGame("LEGION ANNIHILATED!");
                }
                if (e.y > canvas.height) entities.splice(idx, 1);
            });
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.04; if (p.life <= 0) particles.splice(i, 1); });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const lw = canvas.width / LANES;
            for (let i = 0; i < 3; i++) { ctx.fillStyle = laneRoles[i].color; ctx.fillRect(i * lw, 0, lw, canvas.height); }
            ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.setLineDash([15, 15]);
            for (let i = 1; i < LANES; i++) { ctx.beginPath(); ctx.moveTo(i * lw, 0); ctx.lineTo(i * lw, canvas.height); ctx.stroke(); }
            ctx.setLineDash([]);
            entities.forEach(e => e.draw());
            ctx.fillStyle = '#facc15'; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill(); });
            particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1; });
            
            const pY = canvas.height - 150;
            const cS = Math.min(25, Math.ceil(score / 5));
            ctx.font = '24px serif';
            for (let i = 0; i < cS; i++) {
                const off = playerSwarm[i % playerSwarm.length];
                const jx = Math.sin(Date.now() / 180 + i) * 4, jy = Math.cos(Date.now() / 180 + i) * 4;
                ctx.fillText('🏃', playerX + off.x + jx - 12, pY + off.y + jy);
            }
            const sS = formatVal(score);
            ctx.font = '900 20px var(--font-main)';
            const tM = ctx.measureText(sS);
            const bW = Math.max(70, tM.width + 20);
            ctx.fillStyle = 'white'; ctx.beginPath(); ctx.roundRect(playerX - bW / 2, pY - 55, bW, 30, 10); ctx.fill();
            ctx.fillStyle = '#0f172a'; ctx.textAlign = 'center'; ctx.fillText(sS, playerX, pY - 33);
        }

        async function endGame(reason) {
            gameActive = false;
            document.getElementById('fail-reason').innerText = reason;
            document.getElementById('final-dist').innerText = formatVal(distance);
            document.getElementById('final-army').innerText = formatVal(peakArmy);
            document.getElementById('final-time').innerText = formatT(runTime);
            
            // Update records in memory
            records.distance = Math.max(records.distance, distance);
            records.army = Math.max(records.army, peakArmy);
            records.time = Math.max(records.time, Math.floor(runTime / 1000));
            updateRecordsUI();

            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        function start() {
            score = 10; peakArmy = 10; distance = 0; speed = INITIAL_SPEED;
            runTime = 0; startTime = Date.now();
            currentLane = 1; updateTargetX(); playerX = targetX;
            entities = []; particles = []; bullets = []; lastShiftDist = 0;
            bannerShownThisRun = false;
            lastSpawns = [Date.now(), Date.now(), Date.now()];
            shuffleLanes(); gameActive = true;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
        }

        document.getElementById('start-btn').addEventListener('click', start);
        document.getElementById('restart-btn').addEventListener('click', start);
        updateRecordsUI();

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
