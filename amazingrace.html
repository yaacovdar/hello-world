    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --neon-green: #39ff14;
            --neon-yellow: #fefe33;
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* Neon Glows */
        .glow-blue { box-shadow: 0 0 15px var(--neon-blue); border-color: var(--neon-blue); }
        .glow-red { box-shadow: 0 0 15px var(--neon-red); border-color: var(--neon-red); }
        .glow-green { box-shadow: 0 0 15px var(--neon-green); border-color: var(--neon-green); }
        .glow-yellow { box-shadow: 0 0 15px var(--neon-yellow); border-color: var(--neon-yellow); }

        .btn-mode {
            background: var(--card-bg);
            transition: all 0.3s ease;
            border: 1px solid #333;
        }

        .btn-mode:active {
            transform: scale(0.95);
            background: #222;
        }

        /* Color Block Styles */
        .color-block {
            aspect-ratio: 1/1;
            border-radius: 12px;
            transition: opacity 0.1s, transform 0.1s;
            cursor: pointer;
        }
        .color-block:active {
            opacity: 0.6;
            transform: scale(0.92);
        }

        /* Keypad Styles */
        .key {
            background: #222;
            border: 1px solid #444;
            border-radius: 50%;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
        }
        .key:active { background: #444; }

        /* Screen Transitions */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            padding: 1.5rem;
            animation: fadeIn 0.4s ease-out;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LED Indicator */
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #333;
            transition: background 0.3s;
        }
        .led.active-red { background: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
        .led.active-green { background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

        /* Custom Modal */
        #riddle-modal {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>

    <script>
        /**
         * ==========================================
         * CORE ENGINE (Logic & Behavior)
         * ==========================================
         */

        // --- STATE MANAGEMENT ---
        let currentState = {
            currentInput: '',
            currentSequence: [], // Used for Simon mode
            activeScreen: 'home'
        };

        // --- AUDIO ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            tap: () => playTone(440, 'sine', 0.1),
            success: () => {
                playTone(523.25, 'sine', 0.2);
                setTimeout(() => playTone(659.25, 'sine', 0.2), 150);
                setTimeout(() => playTone(783.99, 'sine', 0.4), 300);
            },
            fail: () => {
                playTone(200, 'sawtooth', 0.2);
                playTone(150, 'sawtooth', 0.4);
            }
        };

        // --- CORE NAVIGATION ---
        function switchScreen(screenId) {
            sounds.tap();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');
            currentState.activeScreen = screenId;
            
            keyFullReset();
            simonReset();
            
            const textInput = document.getElementById('text-input');
            if (textInput) textInput.value = '';
            if (screenId === 'text') {
                setTimeout(() => textInput.focus(), 100);
            }
        }

        function goHome() {
            switchScreen('home');
        }

        // --- KEYPAD LOGIC ---
        function keyPress(num) {
            if (currentState.currentInput.length < 10) {
                sounds.tap();
                currentState.currentInput += num;
                updateKeypadDisplay();
            }
        }

        function keyBackspace() {
            if (currentState.currentInput.length > 0) {
                sounds.tap();
                currentState.currentInput = currentState.currentInput.slice(0, -1);
                updateKeypadDisplay();
            }
        }

        function keyFullReset() {
            currentState.currentInput = '';
            updateKeypadDisplay();
        }

        function updateKeypadDisplay() {
            const el = document.getElementById('keypad-display');
            if (el) el.innerText = currentState.currentInput;
        }

        function keySubmit() {
            validateInput('code', currentState.currentInput);
        }

        // --- SIMON LOGIC (STATE MACHINE) ---
        function simonTap(color) {
            sounds.tap();
            currentState.currentSequence.push(color);
            
            if (currentState.currentSequence.length > 12) {
                currentState.currentSequence.shift();
            }
            
            updateSimonProgress();
            
            const matchingRiddle = RIDDLES.find(r => {
                if (r.type !== 'sequence') return false;
                const ans = r.answer;
                if (currentState.currentSequence.length < ans.length) return false;
                const recentHistory = currentState.currentSequence.slice(-ans.length);
                return JSON.stringify(recentHistory) === JSON.stringify(ans);
            });

            if (matchingRiddle) {
                handleSuccess(matchingRiddle.text);
            }
        }

        function simonReset() {
            currentState.currentSequence = [];
            updateSimonProgress();
        }

        function updateSimonProgress() {
            const container = document.getElementById('simon-progress');
            if (!container) return;
            container.innerHTML = '';
            currentState.currentSequence.forEach(color => {
                const dot = document.createElement('div');
                const colorMap = {
                    red: 'bg-red-500',
                    blue: 'bg-cyan-500',
                    green: 'bg-green-500',
                    yellow: 'bg-yellow-400'
                };
                dot.className = `w-3 h-3 rounded-full ${colorMap[color]} opacity-60 shadow-lg`;
                container.appendChild(dot);
            });
        }

        // --- TEXT LOGIC ---
        function textSubmit() {
            const val = document.getElementById('text-input').value.trim();
            validateInput('text', val);
        }

        // --- VALIDATION ENGINE ---
        function validateInput(type, input) {
            let foundRiddle = null;

            if (type === 'code' || type === 'text') {
                foundRiddle = RIDDLES.find(r => {
                    if (r.type !== type) return false;
                    if (Array.isArray(r.answer)) {
                        return r.answer.some(a => a.toLowerCase() === input.toLowerCase());
                    }
                    return r.answer.toLowerCase() === input.toLowerCase();
                });
            }

            if (foundRiddle) {
                handleSuccess(foundRiddle.text);
            } else {
                handleFailure();
            }
        }

        function handleSuccess(text) {
            sounds.success();
            flashLED('green');
            document.getElementById('riddle-content').innerText = text;
            document.getElementById('riddle-modal').classList.remove('hidden');
        }

        function handleFailure() {
            sounds.fail();
            flashLED('red');
        }

        function flashLED(status) {
            const led = document.getElementById(`led-${currentState.activeScreen}`);
            if (!led) return;
            const className = status === 'green' ? 'active-green' : 'active-red';
            led.classList.add(className);
            setTimeout(() => led.classList.remove(className), 1000);
        }

        function closeModal() {
            document.getElementById('riddle-modal').classList.add('hidden');
            goHome();
        }

        // --- DATA LOADER LOGIC ---

        function setStatus(en, he) {
            const el = document.getElementById('loader-warning');
            if (!el) return;
            el.innerHTML = `
                <span>${en}</span>
                <span dir="rtl">${he}</span>
            `;
        }

        function initDataLoader() {
            const params = new URLSearchParams(window.location.search);
            const externalFile = params.get('data');

            if (!externalFile) {
                setStatus('Using default riddles', 'משתמש בחידות ברירת המחדל');
                return;
            }

            const script = document.createElement('script');
            script.src = externalFile;
            
            script.onload = function() {
                if (window.EXTERNAL_RIDDLES) {
                    RIDDLES = window.EXTERNAL_RIDDLES;
                    setStatus('External riddles loaded', 'חידות חיצוניות נטענו');
                    setTimeout(() => setStatus('', ''), 3000);
                } else {
                    setStatus("Can't open riddles file (data missing)", "לא ניתן לפתוח את קובץ החידות (נתונים חסרים)");
                }
            };

            script.onerror = function() {
                setStatus("Can't open riddles file", "לא ניתן לפתוח את קובץ החידות");
            };

            document.head.appendChild(script);
        }

        // --- GLOBAL EVENT LISTENERS ---
        
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const modal = document.getElementById('riddle-modal');
                if (modal && !modal.classList.contains('hidden')) {
                    closeModal();
                }
            }
        });

        document.body.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });

        window.onload = initDataLoader;

    </script>
</body>
</html>
